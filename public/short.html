<!DOCTYPE html>
<html class="page-short" lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="hostaka-icon.png" type="image/png">
<title>Hostaka — الريلز</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>
<body class="page-short">

<div class="loader" id="loader"><div class="spinner"></div></div>

<div class="topbar">
  <button class="back-btn" onclick="location.href='/'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="topbar-title">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2.5"/><polygon points="10.5 9.5 15 12 10.5 14.5" fill="currentColor" stroke="none"/></svg>
    الريلز
  </div>
  <div style="width:38px;"></div>
</div>

<div class="reels-feed" id="reelsFeed"></div>

<div class="comments-sheet-bd" id="commentsSheetBd" onclick="if(event.target===this) closeComments();">
  <div class="comments-sheet">
    <div class="comments-head">
      <span id="commentsCount">التعليقات</span>
      <button onclick="closeComments()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="comments-list" id="commentsList"></div>
    <div class="comments-input-row">
      <input type="text" id="commentInput" placeholder="أضف تعليقاً..." maxlength="500" onkeydown="if(event.key==='Enter') sendReelComment();">
      <button onclick="sendReelComment()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

  <script src="/script.js" defer></script>
</body>
</html>
