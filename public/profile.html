<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="hostaka-icon.png" type="image/png">
  <title>Hostaka — الملف الشخصي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --black:#ffffff;
      --dark:#f7f7f8;
      --card:#ffffff;
      --border:#e5e5e5;
      --text:#1a1a1a;
      --muted:#6b7280;
      --red:#000000;
      --red-h:#333333;
      --accent:#000000;
      --mine-bg:rgba(0,0,0,0.08);
      --mine-border:rgba(0,0,0,0.12);
      --their-bg:rgba(0,0,0,0.04);
      --their-border:rgba(0,0,0,0.06);
      --topbar-bg:rgba(255,255,255,0.75);
      --input-bg:#f7f7f8;
      --modal-bg:#ffffff;
      --shadow:0 8px 32px rgba(0,0,0,0.3);
      --avatar-gradient:linear-gradient(145deg, var(--red), #333333);
    }
    [data-theme="dark"] {
      --black:#0d0d0d;
      --dark:#141414;
      --card:#1a1a1a;
      --border:#2a2a2a;
      --text:#e5e5e5;
      --muted:#8d8d8d;
      --red:#d4af37;
      --red-h:#e6c74a;
      --accent:#d4af37;
      --topbar-bg:rgba(13,13,13,0.85);
      --input-bg:#222222;
      --modal-bg:#1a1a1a;
      --shadow:0 8px 32px rgba(0,0,0,0.7);
      --avatar-gradient:linear-gradient(145deg, #d4af37, #b8962e);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{scroll-behavior:smooth;}
    body{
      background:radial-gradient(circle at 18% 16%,rgba(0,0,0,0.06),transparent 22%),var(--black);
      color:var(--text);
      font-family:'Cairo',sans-serif;
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      transition:background 0.3s ease, color 0.3s ease;
    }

    .topbar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      height:56px;
      background:var(--topbar-bg);
      backdrop-filter:blur(24px) saturate(1.2);
      -webkit-backdrop-filter:blur(24px) saturate(1.2);
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 16px;
      z-index:100;
      transition:background 0.3s ease, border-color 0.3s ease;
    }
    .topbar.scrolled{background:var(--black);}
    .topbar-left{display:flex;align-items:center;gap:8px;}
    .topbar-right{display:flex;align-items:center;gap:6px;}
    .back-btn{
      display:inline-flex;
      align-items:center;
      gap:7px;
      background:rgba(128,128,128,0.08);
      border:1px solid var(--border);
      color:var(--muted);
      padding:7px 14px;
      border-radius:999px;
      cursor:pointer;
      font-family:'Cairo',sans-serif;
      font-size:0.82rem;
      text-decoration:none;
      transition:all 0.2s;
      font-weight:600;
    }
    .back-btn:hover{background:rgba(128,128,128,0.15);color:var(--text);border-color:var(--border);}
    .back-btn:active{transform:scale(0.95);}
    .back-btn svg{width:14px;height:14px;}
    .topbar-title{font-weight:800;font-size:0.9rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}

    .icon-btn {
      position: relative;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(128,128,128,0.08);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s ease;
      text-decoration: none;
      flex-shrink: 0;
    }
    .icon-btn:hover, .icon-btn:active { background: rgba(128,128,128,0.15); color: var(--text); border-color: var(--border); }
    .icon-btn svg { width: 16px; height: 16px; }

    .lang-selector { position: relative; }
    .lang-menu {
      position: absolute;
      top: 42px;
      left: 0;
      background: var(--modal-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px 0;
      min-width: 140px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-6px) scale(0.96);
      transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
      z-index: 20;
      box-shadow: var(--shadow);
    }
    .lang-menu.show { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
    .lang-menu button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 16px;
      background: none;
      border: none;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
      text-align: right;
    }
    .lang-menu button:hover { background: rgba(128,128,128,0.08); }
    .lang-menu button .flag { font-size: 1.1rem; }

    .cover-wrap{
      position:relative;
      width:100%;
      height:220px;
      margin-top:56px;
      background:var(--card);
      overflow:hidden;
      cursor:pointer;
      transition:height 0.3s;
    }
    .cover-img{width:100%;height:100%;object-fit:cover;display:block;}
    .cover-placeholder{
      width:100%;
      height:100%;
      background:linear-gradient(135deg,#0d0d0e 0%,#1a1a1e 50%,#0d0d0e 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#333;
    }
    .cover-placeholder svg{width:48px;height:48px;}
    .cover-edit-btn{
      position:absolute;
      bottom:12px;
      left:12px;
      background:rgba(0,0,0,0.7);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.1);
      color:#fff;
      padding:6px 12px;
      border-radius:8px;
      cursor:pointer;
      font-family:'Cairo',sans-serif;
      font-size:0.72rem;
      display:none;
      align-items:center;
      gap:5px;
      transition:all 0.2s;
      font-weight:600;
    }
    .cover-edit-btn:hover{background:rgba(0,0,0,0.9);}
    .cover-edit-btn svg{width:12px;height:12px;}
    .cover-wrap:hover .cover-edit-btn{display:flex;}

    .profile-section{max-width:720px;margin:0 auto;padding:0 18px;}
    .avatar-pull{
      position:relative;
      margin-top:-48px;
      margin-bottom:14px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
    }
    .avatar-big{
      width:96px;
      height:96px;
      border-radius:50%;
      background:var(--avatar-gradient);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2.2rem;
      font-weight:800;
      color:#fff;
      overflow:hidden;
      border:3px solid var(--black);
      flex-shrink:0;
      position:relative;
      cursor:pointer;
      transition:transform 0.2s,box-shadow 0.2s;
    }
    .avatar-big:hover{transform:scale(1.03);box-shadow:0 0 0 4px rgba(212,175,55,0.2);}
    .avatar-big img{width:100%;height:100%;object-fit:cover;}
    .av-overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.5);
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      transition:opacity 0.2s;
      border-radius:50%;
    }
    .avatar-big:hover .av-overlay{opacity:1;}
    .av-overlay svg{width:18px;height:18px;}

    .profile-actions{display:flex;gap:8px;padding-bottom:4px;flex-wrap:wrap;justify-content:flex-end;}
    .btn-edit{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 16px;
      background:rgba(128,128,128,0.08);
      border:1px solid var(--border);
      border-radius:10px;
      color:var(--muted);
      cursor:pointer;
      font-family:'Cairo',sans-serif;
      font-size:0.82rem;
      font-weight:700;
      transition:all 0.18s;
    }
    .btn-edit:hover{background:rgba(128,128,128,0.15);color:var(--text);border-color:var(--border);}
    .btn-edit:active{transform:scale(0.95);}
    .btn-edit svg{width:13px;height:13px;}
    .btn-msg{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 16px;
      background:rgba(212,175,55,0.12);
      border:1px solid rgba(212,175,55,0.25);
      border-radius:10px;
      color:var(--red);
      cursor:pointer;
      font-family:'Cairo',sans-serif;
      font-size:0.82rem;
      font-weight:700;
      transition:all 0.18s;
      text-decoration:none;
    }
    .btn-msg:hover{background:rgba(212,175,55,0.2);transform:translateY(-1px);}
    .btn-msg:active{transform:scale(0.95);}
    .btn-msg svg{width:13px;height:13px;}

    .profile-meta{padding:4px 0 16px;}
    .meta-name{
      font-size:1.3rem;
      font-weight:900;
      color:var(--text);
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .verified-icon{flex-shrink:0;}
    .verified-icon svg{width:18px;height:18px;}
    .meta-un{font-size:0.85rem;color:var(--muted);margin-top:2px;}
    .role-badge{
      display:inline-flex;
      align-items:center;
      gap:4px;
      padding:2px 9px;
      border-radius:999px;
      font-size:0.68rem;
      font-weight:700;
      margin-top:6px;
    }
    .badge-admin{background:rgba(212,175,55,0.15);color:var(--red);border:1px solid rgba(212,175,55,0.25);}
    .badge-admin svg{width:10px;height:10px;}
    .badge-member{background:rgba(128,128,128,0.08);color:var(--muted);border:1px solid var(--border);}
    .meta-bio{color:var(--muted);font-size:0.9rem;line-height:1.8;margin-top:12px;font-family:'Noto Naskh Arabic',serif;word-break:break-word;}
    .meta-info{display:flex;flex-wrap:wrap;gap:16px;margin-top:10px;}
    .info-item{display:flex;align-items:center;gap:5px;font-size:0.8rem;color:var(--muted);}
    .info-item strong{color:var(--text);}
    .info-item svg{width:12px;height:12px;}
    .meta-stats{display:flex;gap:24px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
    .stat{cursor:default;transition:transform 0.15s;}
    .stat:hover{transform:translateY(-1px);}
    .stat-n{font-size:1.1rem;font-weight:800;color:var(--text);}
    .stat-l{font-size:0.74rem;color:var(--muted);}

    .tabs-bar{display:flex;border-bottom:1px solid var(--border);margin-top:16px;}
    .tab-btn{
      flex:1;
      padding:12px;
      text-align:center;
      font-family:'Cairo',sans-serif;
      font-size:0.85rem;
      font-weight:700;
      color:var(--muted);
      cursor:pointer;
      border:none;
      background:none;
      border-bottom:2px solid transparent;
      transition:all 0.2s;
      margin-bottom:-1px;
      position:relative;
    }
    .tab-btn.active{color:var(--text);border-bottom-color:var(--red);}
    .tab-btn:hover:not(.active){color:var(--text);}

    .posts-tab{padding:16px 0;}
    .post-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
      margin-bottom:14px;
      transition:all 0.2s ease;
      position:relative;
    }
    .post-card:hover{border-color:var(--border);}
    .post-img{width:100%;border-radius:10px;max-height:260px;object-fit:cover;margin-bottom:12px;display:block;}
    .post-text{font-family:'Noto Naskh Arabic',serif;color:var(--text);font-size:0.95rem;line-height:1.9;word-break:break-word;}
    .post-text h2{font-size:1.1rem;font-weight:800;color:var(--text);margin:6px 0 4px;}
    .post-text h3{font-size:1rem;font-weight:700;color:var(--text);margin:4px 0 2px;}
    .post-text blockquote{border-right:3px solid var(--red);padding-right:12px;color:var(--muted);font-style:italic;margin:8px 0;background:rgba(128,128,128,0.05);padding:8px 12px;border-radius:0 8px 8px 0;}
    .post-text ul{padding-right:20px;margin:6px 0;}
    .post-text hr{border:none;border-top:1px solid var(--border);margin:10px 0;}
    .post-text b,.post-text strong{color:var(--text);}
    .post-text a{color:var(--red);text-decoration:none;border-bottom:1px solid rgba(212,175,55,0.3);transition:border-color 0.2s;}
    .post-text a:hover{border-color:var(--red);}
    .post-date{
      font-size:0.74rem;
      color:var(--muted);
      margin-top:12px;
      display:flex;
      align-items:center;
      gap:5px;
    }
    .post-date svg{width:11px;height:11px;}
    .post-share{
      background:none;
      border:none;
      color:var(--muted);
      cursor:pointer;
      padding:6px;
      border-radius:8px;
      transition:all 0.15s;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-right:auto;
    }
    .post-share:hover{color:var(--text);background:rgba(128,128,128,0.08);}
    .post-share:active{transform:scale(0.9);}
    .post-share svg{width:13px;height:13px;}
    .post-empty{
      text-align:center;
      padding:60px 24px;
      color:var(--muted);
      font-size:0.9rem;
    }
    .post-empty svg{width:40px;height:40px;margin-bottom:12px;opacity:0.3;}

    .edit-section{padding:16px 0;animation:fadeIn 0.3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .fg{margin-bottom:14px;}
    .fg label{display:block;margin-bottom:6px;color:var(--muted);font-size:0.82rem;font-weight:600;}
    .fg input,.fg textarea{
      width:100%;
      padding:11px 14px;
      background:var(--input-bg);
      border:1px solid var(--border);
      border-radius:10px;
      color:var(--text);
      font-family:'Cairo',sans-serif;
      font-size:0.9rem;
      transition:all 0.2s;
    }
    .fg input:focus,.fg textarea:focus{outline:none;border-color:var(--border);background:var(--input-bg);box-shadow:0 0 0 3px rgba(128,128,128,0.08);}
    .fg input::placeholder,.fg textarea::placeholder{color:var(--muted);}
    .fg textarea{resize:vertical;min-height:80px;line-height:1.7;}
    .fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .alert{
      padding:11px 14px;
      border-radius:10px;
      font-size:0.84rem;
      margin-bottom:14px;
      display:none;
      font-weight:600;
      animation:fadeIn 0.2s ease;
    }
    .alert-err{background:rgba(212,175,55,0.1);color:var(--red);border:1px solid rgba(212,175,55,0.2);}
    .alert-ok{background:rgba(34,197,94,0.08);color:#4ade80;border:1px solid rgba(34,197,94,0.18);}
    .btn-save{
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:11px 24px;
      background:var(--red);
      color:#fff;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-family:'Cairo',sans-serif;
      font-weight:800;
      font-size:0.88rem;
      transition:all 0.2s;
    }
    .btn-save:hover{background:var(--red-h);transform:translateY(-1px);}
    .btn-save:active{transform:translateY(0);}
    .btn-save:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .btn-save svg{width:14px;height:14px;}

    .not-logged{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:100px 24px;
      gap:14px;
      text-align:center;
      animation:fadeIn 0.4s ease;
    }
    .not-logged h2{font-size:1.2rem;font-weight:800;color:var(--text);}
    .not-logged p{color:var(--muted);font-size:0.85rem;max-width:300px;line-height:1.6;}
    .btn-go{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:11px 24px;
      background:var(--red);
      color:#fff;
      border-radius:10px;
      font-weight:800;
      font-size:0.88rem;
      text-decoration:none;
      transition:all 0.2s;
    }
    .btn-go:hover{background:var(--red-h);transform:translateY(-1px);}
    .btn-go:active{transform:scale(0.97);}

    @keyframes spin{to{transform:rotate(360deg);}}
    .spin{
      width:32px;
      height:32px;
      border:3px solid var(--border);
      border-top-color:var(--red);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
      margin:80px auto 14px;
    }

    .toast{
      position:fixed;
      bottom:24px;
      left:50%;
      transform:translateX(-50%) translateY(20px);
      padding:12px 22px;
      border-radius:14px;
      font-size:0.88rem;
      font-weight:600;
      z-index:999;
      border:1px solid var(--border);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      opacity:0;
      visibility:hidden;
      transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
      white-space:nowrap;
      max-width:90vw;
      text-align:center;
    }
    .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
    .toast-success{background:var(--modal-bg);color:var(--text);border-color:var(--border);}
    .toast-error{background:var(--red);color:#fff;border-color:var(--red);}

    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--muted);}

    @media(max-width:768px){
      .topbar{height:52px;padding:0 12px;}
      .back-btn{padding:6px 12px;font-size:0.78rem;}
      .back-btn svg{width:12px;height:12px;}
      .topbar-title{font-size:0.82rem;max-width:140px;}
      .cover-wrap{height:160px;margin-top:52px;}
      .cover-placeholder svg{width:36px;height:36px;}
      .cover-edit-btn{padding:5px 10px;font-size:0.7rem;}
      .profile-section{padding:0 14px;}
      .avatar-pull{margin-top:-40px;}
      .avatar-big{width:78px;height:78px;font-size:1.8rem;border-width:2px;}
      .av-overlay svg{width:14px;height:14px;}
      .profile-actions{gap:6px;}
      .btn-edit,.btn-msg{padding:6px 12px;font-size:0.78rem;}
      .meta-name{font-size:1.1rem;}
      .verified-icon svg{width:15px;height:15px;}
      .meta-bio{font-size:0.85rem;}
      .meta-info{gap:12px;}
      .meta-stats{gap:18px;}
      .stat-n{font-size:1rem;}
      .tab-btn{padding:10px;font-size:0.82rem;}
      .post-card{padding:14px;border-radius:14px;}
      .post-img{max-height:200px;}
      .post-text{font-size:0.9rem;}
      .fg-row{grid-template-columns:1fr;}
      .fg input,.fg textarea{padding:10px 12px;}
      .btn-save{padding:10px 20px;}
      .not-logged{padding:80px 20px;}
    }
    @media(max-width:400px){
      .topbar{padding:0 10px;}
      .topbar-title{max-width:100px;}
      .cover-wrap{height:130px;}
      .avatar-pull{flex-wrap:wrap;}
      .profile-actions{width:100%;justify-content:flex-start;}
      .meta-stats{gap:14px;}
      .stat-n{font-size:0.95rem;}
      .tab-btn{padding:8px;font-size:0.78rem;}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}
    }
  </style>
</head>
<body>
<header class="topbar" id="topbar">
  <div class="topbar-left">
    <a href="javascript:history.back()" class="back-btn" id="backBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="backText">رجوع</span>
    </a>
    <span class="topbar-title" id="topbarTitle">الملف الشخصي</span>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="تبديل الثيم">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <div class="lang-selector icon-btn" id="langToggle" onclick="toggleLangMenu()" title="تغيير اللغة">

let currentLang = localStorage.getItem('hostaka_lang') || 'ar';
let currentTheme = localStorage.getItem('hostaka_theme') || 'light';

//  CORE FUNCTIONS
// ============================================================
const getToken = () => localStorage.getItem('hostaka_token')||'';
const urlParams = new URLSearchParams(location.search);
const viewUsername = urlParams.get('u');
let ME = null;
let newAvBase64 = '';
let newCoverBase64 = '';
let currentTab = 'posts';
let userPosts = [];

function t(key) {
  return LANG[currentLang]?.[key] || LANG['ar'][key] || key;
}

function applyLang() {
  document.documentElement.lang = currentLang;
  document.documentElement.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
  document.getElementById('backText').textContent = t('back');
  document.getElementById('topbarTitle').textContent = t('profile');
  document.getElementById('coverEditText').textContent = t('changeCover');
  // Update dynamic sections if rendered
  const profileSection = document.getElementById('profileSection');
  if (profileSection && !profileSection.querySelector('.spin')) {
    // Re-render if user data is loaded
    if (viewUsername) {
      // We don't have user data here, we rely on render functions
    } else if (ME) {
      // We need to re-render, but we don't have posts easily here.
      // Instead, we call a reload of the profile data or just update texts.
      // To keep it simple, we use a flag or re-fetch.
      // Since this is a static file, we can just re-run the init or update the DOM directly.
      // We'll call refreshUI if available.
      refreshUITexts();
    }
  }
}

function refreshUITexts() {
  // Update tab buttons if they exist
  const tabPosts = document.getElementById('tabPosts');
  const tabEdit = document.getElementById('tabEdit');
  if (tabPosts) tabPosts.textContent = t('posts');
  if (tabEdit) tabEdit.textContent = t('edit');
  // Update edit section labels
  const fNameLabel = document.querySelector('.fg label[for="fName"]');
  if (fNameLabel) {
    const labels = document.querySelectorAll('.fg label');
    if (labels.length >= 2) {
      labels[0].textContent = t('editProfile'); // Display Name
      labels[1].textContent = t('gameId');
    }
  }
  const fBioLabel = document.querySelector('.fg label[for="fBio"]');
  if (fBioLabel) fBioLabel.textContent = t('bio');
  const saveBtn = document.getElementById('saveBtn');
  if (saveBtn) {
    const span = saveBtn.querySelector('span') || saveBtn;
    span.innerHTML = `${SVG.save}${t('save')}`;
  }
}

function toggleTheme() {
  const html = document.documentElement;
  if (currentTheme === 'light') {
    html.setAttribute('data-theme', 'dark');
    currentTheme = 'dark';
    document.getElementById('themeToggle').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  } else {
    html.removeAttribute('data-theme');
    currentTheme = 'light';
    document.getElementById('themeToggle').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

function toggleLangMenu() {
  document.getElementById('langMenu').classList.toggle('show');
}
document.addEventListener('click', (e) => {
  if (!document.getElementById('langToggle').contains(e.target)) {
    document.getElementById('langMenu').classList.remove('show');
  }
});

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('hostaka_lang', lang);
  document.getElementById('langMenu').classList.remove('show');
  applyLang();
  // Re-render profile section to update dynamic texts
  if (viewUsername) {
    // If viewing someone else, we need to re-fetch or just update texts.
    // Since we don't have user data stored globally for view, we can just update static parts.
    refreshUITexts();
    // Update meta stats label
    const statL = document.querySelector('.stat-l');
    if (statL) statL.textContent = t('posts');
    const metaUn = document.querySelector('.meta-un');
    // Role badge is static text, update it
    const roleBadges = document.querySelectorAll('.role-badge');
    roleBadges.forEach(b => {
      if (b.textContent.includes('Admin') || b.textContent.includes('مدير') || b.textContent.includes('管理员')) {
        b.textContent = t('admin');
      } else if (b.textContent.includes('Member') || b.textContent.includes('عضو')) {
        b.textContent = t('member');
      }
    });
    // Since we can't easily re-render posts without data, we reload the page or just leave it.
    // Better to reload the page for simplicity to ensure all dynamic data is translated.
    // But we can just re-fetch.
    if (viewUsername) {
      // Reload data or just refresh page? Let's just reload page for simplicity on language change.
      // Actually, let's just refresh the whole profile data.
      window.location.reload();
    }
  } else if (ME) {
    // Reload the profile data from server to re-render with new language
    window.location.reload();
  }
}

// ============================================================
async function init(){
  // Apply saved theme
  if (currentTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  }

  // Apply language
  applyLang();

  window.addEventListener('scroll',()=>{
    document.getElementById('topbar').classList.toggle('scrolled', window.scrollY > 10);
  });

  const token = getToken();
  if(viewUsername){
    try{
      const [pr,ps] = await Promise.all([
        fetch('/api/profile/'+encodeURIComponent(viewUsername)).then(r=>r.json()),
        fetch('/api/user/'+encodeURIComponent(viewUsername)+'/posts').then(r=>r.json())
      ]);
      if(pr.error){ renderNotFound(); return; }
      document.getElementById('topbarTitle').textContent = pr.display_name||pr.username;
      renderCover(pr.cover||'', false);
      renderPublic(pr, Array.isArray(ps)?ps:[]);
    }catch(e){ renderNotFound(); }
    return;
  }
  if(!token){ renderNotLogged(); return; }
  try{
    const r = await fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});
    if(!r.ok){ renderNotLogged(); return; }
    const u = await r.json();
    if(!u||u.error){ renderNotLogged(); return; }
    ME = u;
    renderCover(u.cover||'', true);
    renderMyProfile(u,[]);
    Promise.all([
      fetch('/api/me',{headers:{'Authorization':'Bearer '+token}}).then(r=>r.ok?r.json():null),
      fetch('/api/user/'+u.username+'/posts').then(r=>r.ok?r.json():[])
    ]).then(([full,posts])=>{
      if(full&&!full.error){ ME=full; renderCover(full.cover||'',true); renderMyProfile(full,Array.isArray(posts)?posts:[]); }
    }).catch(()=>{});
  }catch(e){ renderNotLogged(); }
}

function renderCover(url, editable){
  const img=document.getElementById('coverImg');
  const ph=document.getElementById('coverPlaceholder');
  const btn=document.getElementById('coverEditBtn');
  if(url){ img.src=url; img.style.display='block'; ph.style.display='none'; }
  else { img.style.display='none'; ph.style.display='flex'; }
  if(editable) btn.style.display='flex';
}

function showToast(msg, type='success'){
  let t = document.querySelector('.toast');
  if(t) t.remove();
  t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 3000);
}

function renderNotFound(){
  document.getElementById('profileSection').innerHTML=`<div class="not-logged">${SVG.user}<h2>${t('notFound')}</h2><p>${t('notFound')}</p><a href="/" class="btn-go">${SVG.arrow}${t('home')}</a></div>`;
}
function renderNotLogged(){
  document.getElementById('profileSection').innerHTML=`<div class="not-logged">${SVG.user}<h2>${t('pleaseLogin')}</h2><p>${t('pleaseLogin')}</p><a href="/" class="btn-go">${SVG.arrow}${t('home')}</a></div>`;
}

function roleBadge(role){
  const label = (role==='admin') ? t('admin') : t('member');
  return role==='admin'
    ? `<span class="role-badge badge-admin">${SVG.star}${label}</span>`
    : `<span class="role-badge badge-member">${label}</span>`;
}

function avatarInner(user){
  return user.avatar?`<img src="${esc(user.avatar)}" alt="">`:(esc((user.display_name||user.username||'?').charAt(0).toUpperCase()));
}

function renderPublic(user, posts){
  userPosts=posts;
  const token=getToken();
  document.getElementById('profileSection').innerHTML=`
    <div class="avatar-pull">
      <div class="avatar-big" style="cursor:default;">${avatarInner(user)}</div>
      <div class="profile-actions">
        ${token&&token!==''?`<a href="/chat?with=${esc(user.username)}" class="btn-msg">${SVG.msg}${t('message')||'مراسلة'}</a>`:''}

    </div>

      <div class="meta-name">${esc(user.display_name||user.username)} ${user.verified?verifiedBadge():''}</div>

      ${roleBadge(user.role)}
      ${user.bio?`<div class="meta-bio">${esc(user.bio)}</div>`:''}
      <div class="meta-info">
        ${user.game_id?`<div class="info-item">${SVG.mail}<strong>${esc(user.game_id)}</strong></div>`:''}

      <button class="tab-btn active" onclick="switchTab('posts')">${t('posts')}</button>
    </div>
    <div class="posts-tab" id="postsTab">${renderPosts(posts)}</div>`;
}

      <div class="meta-info">
        ${user.game_id?`<div class="info-item">${SVG.mail}<strong>${esc(user.game_id)}</strong></div>`:''}
        <div class="info-item">${SVG.clock}${t('since')} ${fmtDate(user.created_at)}</div>
      </div>
      <div class="meta-stats">
        <div class="stat"><div class="stat-n">${posts.length}</div><div class="stat-l">${t('posts')}</div></div>
      </div>
    </div>
    <div class="tabs-bar">
      <button class="tab-btn active" id="tabPosts" onclick="switchTab('posts')">${t('posts')}</button>
      <button class="tab-btn" id="tabEdit" onclick="switchTab('edit')">${t('editProfile')}</button>
    </div>
    <div class="posts-tab" id="postsTab">${renderPosts(posts)}</div>
    <div class="edit-section" id="editTab" style="display:none;">
      <div class="alert alert-err" id="pErr"></div>
      <div class="alert alert-ok" id="pOk"></div>
      <div class="fg-row">
        <div class="fg"><label>${t('editProfile')}</label><input type="text" id="fName" value="${esc(user.display_name||'')}" placeholder="${t('editProfile')}"></div>
        <div class="fg"><label>${t('gameId')}</label><input type="text" id="fGame" value="${esc(user.game_id||'')}" dir="ltr" placeholder="#0000"></div>
      </div>
      <div class="fg"><label>${t('bio')}</label><textarea id="fBio" placeholder="${t('bio')}">${esc(user.bio||'')}</textarea></div>
      <button class="btn-save" id="saveBtn" onclick="save()">${SVG.save}${t('save')}</button>
    </div>`;
}

function renderPosts(posts){
  if(!posts||!posts.length) return `<div class="post-empty">${SVG.post}<div>${t('noPosts')}</div></div>`;
  return posts.map(p=>`
    <div class="post-card">
      ${p.image?`<img class="post-img" src="${esc(p.image)}" loading="lazy" onerror="this.style.display='none'">`:''}
      <div class="post-text">${p.content||''}</div>
      <div class="post-date">
        ${SVG.clock}
        ${fmtDate(p.created_at)}
        <button class="post-share" onclick="sharePost(${p.id})" title="${t('shareLink')}">${SVG.share}</button>
      </div>
    </div>`).join('');
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const postsTab=document.getElementById('postsTab');
  const editTab=document.getElementById('editTab');
  if(tab==='posts'){
    document.getElementById('tabPosts')?.classList.add('active');
    if(postsTab) postsTab.style.display='block';
    if(editTab) editTab.style.display='none';
  } else {
    document.getElementById('tabEdit')?.classList.add('active');
    if(postsTab) postsTab.style.display='none';
    if(editTab) editTab.style.display='block';
  }
}

function sharePost(id){
  const url=window.location.origin+'/?p='+id;
  if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>showToast(t('linkCopied')));
  else prompt('الرابط:',url);
}

function onAvatar(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    newAvBase64=ev.target.result;
    const el=document.getElementById('avBig');
    if(el) el.innerHTML=`<img src="${newAvBase64}" alt=""><div class="av-overlay">${SVG.camera}</div>`;
  };
  r.readAsDataURL(f);
}

function onCover(e){
  const f=e.target.files[0]; if(!f) return;
  if(!f.type.match('image/jpeg')){ showToast(t('coverJpg'),'error'); return; }
  const r=new FileReader();
  r.onload=ev=>{ newCoverBase64=ev.target.result; renderCover(newCoverBase64,true); };
  r.readAsDataURL(f);
  e.target.value='';
}

async function save(){
  const display_name=document.getElementById('fName')?.value.trim()||'';
  const bio=document.getElementById('fBio')?.value.trim()||'';
  const game_id=document.getElementById('fGame')?.value.trim()||'';
  const errEl=document.getElementById('pErr'), okEl=document.getElementById('pOk');
  errEl.style.display='none'; okEl.style.display='none';
  const btn=document.getElementById('saveBtn'); btn.disabled=true; btn.textContent='...';
  const token=getToken();
  try{
    let avatarUrl=ME?.avatar||'';
    let coverUrl=ME?.cover||'';
    if(newAvBase64){
      const up=await fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({image:newAvBase64})});
      const ud=await up.json(); if(ud.url) avatarUrl=ud.url;
    }
    if(newCoverBase64){
      const up=await fetch('/api/upload',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({image:newCoverBase64})});
      const ud=await up.json(); if(ud.url) coverUrl=ud.url;
    }
    const r=await fetch('/api/profile',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({display_name,bio,game_id,avatar:avatarUrl,cover:coverUrl})});
    const d=await r.json();
    if(d.success){
      try{ const u=JSON.parse(localStorage.getItem('hostaka_user')||'{}'); u.avatar=avatarUrl; u.display_name=display_name; localStorage.setItem('hostaka_user',JSON.stringify(u)); }catch(e){}
      okEl.textContent=t('saveSuccess'); okEl.style.display='block';
      newAvBase64=''; newCoverBase64='';
      showToast(t('saveSuccess'));
      window.location.reload(); // Reload to reflect changes with new language
    } else { errEl.textContent=d.error||t('saveError'); errEl.style.display='block'; showToast(d.error||t('saveError'),'error'); }
  }catch(e){ errEl.textContent=t('connectionError'); errEl.style.display='block'; showToast(t('connectionError'),'error'); }
  finally{
    btn.disabled=false;
    btn.innerHTML=`${SVG.save}${t('save')}`;
  }
}

// ============================================================
//  START
// ============================================================
init();
</script>
</body>
</html>
