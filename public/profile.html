<!DOCTYPE html>
<html class="page-profile" lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="hostaka-icon.png" type="image/png">
  <title>Hostaka — الملف الشخصي</title>
  
  <script defer src="/_vercel/insights/script.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/style.css">
</head>
<body class="page-profile">
<header class="topbar" id="topbar">
  <div class="topbar-left">
    <a href="javascript:history.back()" class="back-btn" id="backBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="backText">رجوع</span>
    </a>
    <span class="topbar-title" id="topbarTitle">الملف الشخصي</span>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="تبديل الثيم">
      <span class="ti-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg></span>
    </button>
    <div class="lang-selector icon-btn" id="langToggle" onclick="toggleLangMenu()" title="تغيير اللغة">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <div class="lang-menu" id="langMenu">
        <button onclick="setLang('ar')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-ar"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-ar)"><rect width="20" height="20" fill="#006c35"/><rect x="4" y="9" width="12" height="2" rx="1" fill="#fff"/></g></svg></span> العربية</button>
        <button onclick="setLang('en')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-en"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-en)"><rect width="20" height="20" fill="#012169"/><path d="M0 0L20 20M20 0L0 20" stroke="#fff" stroke-width="3"/><path d="M10 0V20M0 10H20" stroke="#fff" stroke-width="4"/><path d="M10 0V20M0 10H20" stroke="#C8102E" stroke-width="1.6"/></g></svg></span> English</button>
        <button onclick="setLang('fr')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-fr"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-fr)"><rect width="6.7" height="20" fill="#0055A4"/><rect x="6.7" width="6.6" height="20" fill="#fff"/><rect x="13.3" width="6.7" height="20" fill="#EF4135"/></g></svg></span> Français</button>
        <button onclick="setLang('ru')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-ru"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-ru)"><rect width="20" height="6.7" fill="#fff"/><rect y="6.7" width="20" height="6.6" fill="#0039A6"/><rect y="13.3" width="20" height="6.7" fill="#D52B1E"/></g></svg></span> Русский</button>
        <button onclick="setLang('zh')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-zh"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-zh)"><rect width="20" height="20" fill="#DE2910"/><path d="M6 4l1 3h3l-2.5 2 1 3-2.5-2-2.5 2 1-3-2.5-2h3z" fill="#FFDE00"/></g></svg></span> 中文</button>
        <button onclick="setLang('ja')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-ja"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-ja)"><rect width="20" height="20" fill="#fff"/><circle cx="10" cy="10" r="5.5" fill="#BC002D"/></g></svg></span> 日本語</button>
      </div>
    </div>
  </div>
</header>

<div class="cover-wrap" id="coverWrap">
  <div class="cover-placeholder" id="coverPlaceholder">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </div>
  <img id="coverImg" class="cover-img" style="display:none;" alt="">
  <button class="cover-edit-btn" id="coverEditBtn" onclick="document.getElementById('coverFile').click()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    <span id="coverEditText">تغيير الغلاف</span>
  </button>
</div>

<div class="profile-section" id="profileSection">
  <div class="spin"></div>
</div>

<input type="file" id="avFile" accept="image/*" style="display:none;" onchange="onAvatar(event)">
<input type="file" id="coverFile" accept=".jpg,.jpeg,image/jpeg" style="display:none;" onchange="onCover(event)">

<!-- Modal for followers/following -->
<div class="modal-bd" id="userListModal">
  <div class="modal-box">
    <div class="modal-title">
      <span id="modalTitle">المتابعون</span>
      <button class="modal-close" onclick="closeModal('userListModal')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="modalUserList">
      <div class="spin" style="margin:20px auto;"></div>
    </div>
  </div>
</div>

<!-- الإبلاغ عن مستخدم -->
<div class="modal-bd" id="reportUserModal">
  <div class="modal-box">
    <div class="modal-title">
      <span>الإبلاغ عن مستخدم</span>
      <button class="modal-close" onclick="closeModal('reportUserModal')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <input type="hidden" id="reportUserTarget">
    <select id="reportUserReason" style="width:100%;padding:11px 13px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Cairo',sans-serif;font-size:0.88rem;margin:12px 0 10px;">
      <option value="abuse">إساءة أو تنمر</option>
      <option value="fake">حساب مزيف أو منتحل</option>
      <option value="spam">محتوى مزعج / سبام</option>
      <option value="other">سبب آخر</option>
    </select>
    <textarea id="reportUserDetails" placeholder="تفاصيل إضافية (اختياري)" style="width:100%;min-height:90px;padding:11px 13px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Cairo',sans-serif;font-size:0.88rem;resize:vertical;"></textarea>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px;">
      <button class="btn-edit" onclick="closeModal('reportUserModal')">إلغاء</button>
      <button class="btn-follow" id="reportUserSubmitBtn" onclick="submitUserReport()">إرسال البلاغ</button>
    </div>
  </div>
</div>

<div class="modal-bd" id="postModal">
  <div class="modal-box wide">
    <div class="modal-t">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span id="newPostModalTitle">منشور جديد</span>
    </div>
    <div class="fg" id="postAsWrap" style="display:none;margin-bottom:10px;">
      <label style="font-size:0.78rem;color:var(--muted);font-weight:700;display:block;margin-bottom:6px;">النشر باسم</label>
      <select id="postAsSelect" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:0.85rem;background:var(--input-bg);color:var(--text);"></select>
    </div>
    <div class="err" id="postErr"></div>
    <div class="fmt-bar">
      <button class="fmt-btn" onclick="fmt('bold')" title="غامق">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
      </button>
      <button class="fmt-btn" onclick="fmt('italic')" title="مائل">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
      </button>
      <button class="fmt-btn" onclick="fmt('underline')" title="تسطير">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg>
      </button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn" onclick="fmtBlock('h2')" title="عنوان">H1</button>
      <button class="fmt-btn" onclick="fmtBlock('h3')" title="عنوان فرعي">H2</button>
      <div class="fmt-sep"></div>
      <button class="fmt-btn" onclick="fmtList('ul')" title="قائمة">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="fmt-btn" onclick="fmtLine()" title="فاصل">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="fmt-btn" onclick="fmtQuote()" title="اقتباس">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
      </button>
      <div style="flex:1;"></div>
      <button class="fmt-btn" onclick="document.getElementById('postMediaFile').click()" title="إرفاق صورة أو فيديو" style="gap:5px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span id="attachMediaText">وسائط</span>
      </button>
      <input type="file" id="postMediaFile" accept=".jpg,.jpeg,image/jpeg,.mp4,.webm,.mov,.avi,.mkv,.ogg,video/*" style="display:none;" onchange="onPostMedia(event)">
    </div>
    <div class="fg">
      <div id="postEditor" class="post-editor" contenteditable="true" dir="auto" placeholder="اكتب منشورك هنا..."></div>
    </div>
    <div class="media-preview-wrap" id="postMediaPreviewWrap">
      <div id="postMediaPreview"></div>
      <button class="remove-media" onclick="removePostMedia()" title="إزالة الملف">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- إعدادات النشر: الخصوصية + الجدولة -->
    <div class="post-settings-box">
      <div class="fg">
        <label style="font-size:0.78rem;color:var(--muted);font-weight:700;display:block;margin-bottom:6px;">خصوصية المنشور</label>
        <div class="privacy-choices" id="privacyChoices">
          <button type="button" class="privacy-opt active" data-privacy="public" onclick="selectPostPrivacy('public')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            عام
          </button>
          <button type="button" class="privacy-opt" data-privacy="private" onclick="selectPostPrivacy('private')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            خاص
          </button>
          <button type="button" class="privacy-opt" data-privacy="draft" onclick="selectPostPrivacy('draft')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            مسودة
          </button>
        </div>
      </div>
      <div class="fg" id="scheduleWrap">
        <label style="font-size:0.78rem;color:var(--muted);font-weight:700;display:block;margin-bottom:6px;">جدولة النشر لوقت لاحق (اختياري)</label>
        <input type="datetime-local" id="postScheduleInput" class="schedule-input">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('postModal')"><span id="cancelBtn">إلغاء</span></button>
      <button class="btn-submit" style="width:auto;padding:10px 26px;" id="postBtn" onclick="submitPost()"><span id="publishBtn">نشر</span></button>
    </div>
  </div>
</div>

  <script src="/script.js" defer></script>
</body>
</html>
