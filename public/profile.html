<!DOCTYPE html>
<html class="page-profile" lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="hostaka-icon.png" type="image/png">
  <title>Hostaka — الملف الشخصي</title>
  
  <script defer src="/_vercel/insights/script.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/style.css">
</head>
<body class="page-profile">
<header class="topbar" id="topbar">
  <div class="topbar-left">
    <a href="javascript:history.back()" class="back-btn" id="backBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="backText">رجوع</span>
    </a>
    <span class="topbar-title" id="topbarTitle">الملف الشخصي</span>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="تبديل الثيم">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <div class="lang-selector icon-btn" id="langToggle" onclick="toggleLangMenu()" title="تغيير اللغة">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <div class="lang-menu" id="langMenu">
        <button onclick="setLang('ar')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-ar"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-ar)"><rect width="20" height="20" fill="#006c35"/><rect x="4" y="9" width="12" height="2" rx="1" fill="#fff"/></g></svg></span> العربية</button>
        <button onclick="setLang('en')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-en"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-en)"><rect width="20" height="20" fill="#012169"/><path d="M0 0L20 20M20 0L0 20" stroke="#fff" stroke-width="3"/><path d="M10 0V20M0 10H20" stroke="#fff" stroke-width="4"/><path d="M10 0V20M0 10H20" stroke="#C8102E" stroke-width="1.6"/></g></svg></span> English</button>
        <button onclick="setLang('fr')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-fr"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-fr)"><rect width="6.7" height="20" fill="#0055A4"/><rect x="6.7" width="6.6" height="20" fill="#fff"/><rect x="13.3" width="6.7" height="20" fill="#EF4135"/></g></svg></span> Français</button>
        <button onclick="setLang('ru')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-ru"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-ru)"><rect width="20" height="6.7" fill="#fff"/><rect y="6.7" width="20" height="6.6" fill="#0039A6"/><rect y="13.3" width="20" height="6.7" fill="#D52B1E"/></g></svg></span> Русский</button>
        <button onclick="setLang('zh')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-zh"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-zh)"><rect width="20" height="20" fill="#DE2910"/><path d="M6 4l1 3h3l-2.5 2 1 3-2.5-2-2.5 2 1-3-2.5-2h3z" fill="#FFDE00"/></g></svg></span> 中文</button>
        <button onclick="setLang('ja')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-ja"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-ja)"><rect width="20" height="20" fill="#fff"/><circle cx="10" cy="10" r="5.5" fill="#BC002D"/></g></svg></span> 日本語</button>
      </div>
    </div>
  </div>
</header>

<div class="cover-wrap" id="coverWrap">
  <div class="cover-placeholder" id="coverPlaceholder">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </div>
  <img id="coverImg" class="cover-img" style="display:none;" alt="">
  <button class="cover-edit-btn" id="coverEditBtn" onclick="document.getElementById('coverFile').click()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    <span id="coverEditText">تغيير الغلاف</span>
  </button>
</div>

<div class="profile-section" id="profileSection">
  <div class="spin"></div>
</div>

<input type="file" id="avFile" accept="image/*" style="display:none;" onchange="onAvatar(event)">
<input type="file" id="coverFile" accept=".jpg,.jpeg,image/jpeg" style="display:none;" onchange="onCover(event)">

<!-- Modal for followers/following -->
<div class="modal-bd" id="userListModal">
  <div class="modal-box">
    <div class="modal-title">
      <span id="modalTitle">المتابعون</span>
      <button class="modal-close" onclick="closeModal('userListModal')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="modalUserList">
      <div class="spin" style="margin:20px auto;"></div>
    </div>
  </div>
</div>

<!-- الإبلاغ عن مستخدم -->
<div class="modal-bd" id="reportUserModal">
  <div class="modal-box">
    <div class="modal-title">
      <span>الإبلاغ عن مستخدم</span>
      <button class="modal-close" onclick="closeModal('reportUserModal')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <input type="hidden" id="reportUserTarget">
    <select id="reportUserReason" style="width:100%;padding:11px 13px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Cairo',sans-serif;font-size:0.88rem;margin:12px 0 10px;">
      <option value="abuse">إساءة أو تنمر</option>
      <option value="fake">حساب مزيف أو منتحل</option>
      <option value="spam">محتوى مزعج / سبام</option>
      <option value="other">سبب آخر</option>
    </select>
    <textarea id="reportUserDetails" placeholder="تفاصيل إضافية (اختياري)" style="width:100%;min-height:90px;padding:11px 13px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Cairo',sans-serif;font-size:0.88rem;resize:vertical;"></textarea>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px;">
      <button class="btn-edit" onclick="closeModal('reportUserModal')">إلغاء</button>
      <button class="btn-follow" id="reportUserSubmitBtn" onclick="submitUserReport()">إرسال البلاغ</button>
    </div>
  </div>
</div>

  <script src="/script.js" defer></script>
</body>
</html>
