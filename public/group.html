<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostaka - Maintenance</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI",sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0a0a0a,#1a1a1a,#2a2a2a);
    color:white;
    overflow:hidden;
    position:relative;
}

.bg1,
.bg2,
.bg3{
    position:absolute;
    border-radius:50%;
    filter:blur(180px);
}

.bg1{
    width:500px;
    height:500px;
    background:#ef4444;
    opacity:.12;
    top:-180px;
    left:-180px;
    animation:blob1 8s ease-in-out infinite;
}

.bg2{
    width:450px;
    height:450px;
    background:#dc2626;
    opacity:.10;
    bottom:-180px;
    right:-180px;
    animation:blob2 10s ease-in-out infinite;
}

.bg3{
    width:300px;
    height:300px;
    background:#ffffff;
    opacity:.08;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    animation:blob3 12s ease-in-out infinite;
}

.particle{
    position:absolute;
    border-radius:50%;
}

.p1{
    top:15%;
    left:10%;
    width:4px;
    height:4px;
    background:rgba(239,68,68,.6);
    animation:particle 6s ease-in-out infinite;
}

.p2{
    top:25%;
    right:15%;
    width:3px;
    height:3px;
    background:rgba(255,255,255,.4);
    animation:particle 8s ease-in-out infinite 1s;
}

.p3{
    bottom:20%;
    left:20%;
    width:5px;
    height:5px;
    background:rgba(239,68,68,.5);
    animation:particle 7s ease-in-out infinite 2s;
}

.p4{
    top:60%;
    right:25%;
    width:3px;
    height:3px;
    background:rgba(255,255,255,.3);
    animation:particle 9s ease-in-out infinite .5s;
}

.card{
    position:relative;
    z-index:2;
    width:min(720px,92%);
    text-align:center;
    padding:55px;
    border-radius:32px;
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 25px 80px rgba(0,0,0,.5),0 0 0 1px rgba(239,68,68,.1);
}

.logo-wrap{
    width:140px;
    height:140px;
    margin:0 auto 24px;
    border-radius:28px;
    background:linear-gradient(135deg,#1a1a1a,#2a2a2a);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.06);
    position:relative;
    overflow:hidden;
}

.logo-wrap::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,transparent 40%,rgba(239,68,68,.1) 100%);
}

.logo-text{
    font-size:48px;
    font-weight:800;
    background:linear-gradient(135deg,#ef4444,#dc2626);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    position:relative;
    z-index:1;
}

.badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 20px;
    border-radius:999px;
    background:rgba(239,68,68,.1);
    border:1px solid rgba(239,68,68,.2);
    color:#fca5a5;
    font-size:13px;
    font-weight:500;
    margin-bottom:28px;
    letter-spacing:.5px;
}

.badge-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#ef4444;
    animation:pulse 2s ease-in-out infinite;
}

.icon{
    width:110px;
    height:110px;
    margin:0 auto 28px;
    color:#ef4444;
    position:relative;
}

.icon svg{
    width:100%;
    height:100%;
    animation:float 4s ease-in-out infinite;
    filter:drop-shadow(0 0 20px rgba(239,68,68,.3));
}

h1{
    font-size:44px;
    margin-bottom:16px;
    font-weight:700;
    letter-spacing:-1px;
}

h1 .white{
    color:white;
}

h1 .red{
    background:linear-gradient(135deg,#ef4444,#dc2626);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    color:#a1a1aa;
    line-height:1.8;
    font-size:17px;
    margin-bottom:38px;
    max-width:480px;
    margin-left:auto;
    margin-right:auto;
}

.progress-wrap{
    width:100%;
    max-width:320px;
    height:4px;
    background:rgba(255,255,255,.06);
    border-radius:999px;
    margin:0 auto 38px;
    overflow:hidden;
}

.progress-bar{
    width:65%;
    height:100%;
    background:linear-gradient(90deg,#ef4444,#dc2626);
    border-radius:999px;
    animation:progress 3s ease-in-out infinite;
}

.button{
    display:inline-flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:white;
    padding:16px 36px;
    border-radius:16px;
    font-weight:600;
    font-size:15px;
    background:linear-gradient(135deg,#ef4444,#dc2626);
    transition:all .3s ease;
    box-shadow:0 8px 30px rgba(239,68,68,.25);
    position:relative;
    overflow:hidden;
}

.button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 35px rgba(239,68,68,.4);
}

.button svg{
    width:18px;
    height:18px;
}

.footer{
    margin-top:32px;
    color:#52525b;
    font-size:13px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
}

.footer-dot{
    width:4px;
    height:4px;
    border-radius:50%;
    background:#52525b;
}

@keyframes float{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
}

@keyframes pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.5;transform:scale(.8)}
}

@keyframes blob1{
    0%,100%{transform:translate(0,0)}
    50%{transform:translate(30px,20px)}
}

@keyframes blob2{
    0%,100%{transform:translate(0,0)}
    50%{transform:translate(-20px,-30px)}
}

@keyframes blob3{
    0%,100%{transform:translate(-50%,-50%)scale(1)}
    50%{transform:translate(-50%,-50%)scale(1.2)}
}

@keyframes particle{
    0%,100%{transform:translateY(0)scale(1);opacity:.6}
    50%{transform:translateY(-30px)scale(1.5);opacity:0}
}

@keyframes progress{
    0%{width:30%;opacity:.6}
    50%{width:70%;opacity:1}
    100%{width:30%;opacity:.6}
}

@media(max-width:600px){
    .card{
        padding:40px 24px;
    }
    h1{
        font-size:32px;
    }
    p{
        font-size:15px;
    }
    .icon{
        width:85px;
        height:85px;
    }
    .logo-wrap{
        width:120px;
        height:120px;
    }
    .logo-text{
        font-size:40px;
    }
}
</style>
</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>

<div class="card">

    <div class="logo-wrap">
        <span class="logo-text">H</span>
    </div>

    <div class="badge">
        <span class="badge-dot"></span>
        Scheduled Maintenance
    </div>

    <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 6C4 4.89543 4.89543 4 6 4H18C19.1046 4 20 4.89543 20 6V13C20 14.1046 19.1046 15 18 15H10L5 19V15H6C4.89543 15 4 14.1046 4 13V6Z"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"/>
            <circle cx="9" cy="10" r="1" fill="currentColor"/>
            <circle cx="12" cy="10" r="1" fill="currentColor"/>
            <circle cx="15" cy="10" r="1" fill="currentColor"/>
        </svg>
    </div>

    <h1><span class="white">We'll Be Back</span><span class="red"> Soon</span></h1>

    <p>
        Hostaka is currently undergoing maintenance.<br>
        We're making improvements to enhance your experience and will be back shortly.
    </p>

    <div class="progress-wrap">
        <div class="progress-bar"></div>
    </div>

    <a class="button" href="https://hostaka.ivanova.sbs">
        <span>Return to Homepage</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
    </a>

    <div class="footer">
        <span class="footer-dot"></span>
        <span>© Hostaka Platform</span>
        <span class="footer-dot"></span>
    </div>

</div>

</body>
</html>
