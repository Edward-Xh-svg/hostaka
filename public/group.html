<!DOCTYPE html>
<html class="page-group" lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="hostaka-icon.png" type="image/png">
  <title>Hostaka — المجموعة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/style.css">
</head>
<body class="page-group">

<div class="wallpaper-bg" id="wallpaperBg"></div>
<div class="wallpaper-overlay" id="wallpaperOverlayEl"></div>

<div class="topbar" id="topbar">
  <div class="topbar-left">
    <a href="/chat" class="back-btn" id="backBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="backText">الرسائل</span>
    </a>
    <div class="topbar-peer" id="topbarPeer" onclick="openGroupSettings()">
      <div class="topbar-peer-av" id="groupAvWrap">G</div>
      <div style="min-width:0;">
        <div class="topbar-peer-name" id="groupNameEl">...</div>
        <div class="topbar-peer-role" id="groupMetaEl"></div>
      </div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="تبديل الثيم">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <button class="icon-btn" id="wallpaperToggle" onclick="openWallpaperModal()" title="خلفية المنصة">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
    </button>
    <div class="lang-selector icon-btn" id="langToggle" onclick="toggleLangMenu()" title="تغيير اللغة">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <div class="lang-menu" id="langMenu">
        <button onclick="setLang('ar')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-ar"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-ar)"><rect width="20" height="20" fill="#006c35"/><rect x="4" y="9" width="12" height="2" rx="1" fill="#fff"/></g></svg></span> العربية</button>
        <button onclick="setLang('en')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-en"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-en)"><rect width="20" height="20" fill="#012169"/><path d="M0 0L20 20M20 0L0 20" stroke="#fff" stroke-width="3"/><path d="M10 0V20M0 10H20" stroke="#fff" stroke-width="4"/><path d="M10 0V20M0 10H20" stroke="#C8102E" stroke-width="1.6"/></g></svg></span> English</button>
        <button onclick="setLang('fr')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-fr"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-fr)"><rect width="6.7" height="20" fill="#0055A4"/><rect x="6.7" width="6.6" height="20" fill="#fff"/><rect x="13.3" width="6.7" height="20" fill="#EF4135"/></g></svg></span> Français</button>
        <button onclick="setLang('ru')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-ru"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-ru)"><rect width="20" height="6.7" fill="#fff"/><rect y="6.7" width="20" height="6.6" fill="#0039A6"/><rect y="13.3" width="20" height="6.7" fill="#D52B1E"/></g></svg></span> Русский</button>
        <button onclick="setLang('zh')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-zh"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-zh)"><rect width="20" height="20" fill="#DE2910"/><path d="M6 4l1 3h3l-2.5 2 1 3-2.5-2-2.5 2 1-3-2.5-2h3z" fill="#FFDE00"/></g></svg></span> 中文</button>
        <button onclick="setLang('ja')"><span class="flag"><svg viewBox="0 0 20 20" width="16" height="16"><clipPath id="fc-ja"><circle cx="10" cy="10" r="10"/></clipPath><g clip-path="url(#fc-ja)"><rect width="20" height="20" fill="#fff"/><circle cx="10" cy="10" r="5.5" fill="#BC002D"/></g></svg></span> 日本語</button>
      </div>
    </div>
    <button class="icon-btn sidebar-toggle" onclick="toggleSidebar()" id="sidebarToggle">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </button>
  </div>
</div>

<div class="chat-layout">
  <div class="chat-main" id="chatMain">
    <div class="empty-state" id="emptyState">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span id="loadingText">جارٍ التحميل...</span>
    </div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-head-title" id="membersTitle">الأعضاء</span>
      <button class="btn-add-member" onclick="openAddMember()" id="addMemberBtn" style="display:none;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="addMemberText">إضافة</span>
      </button>
    </div>
    <div class="member-list" id="memberList">
      <div style="text-align:center;padding:30px;color:var(--muted);font-size:0.84rem;">...</div>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- إعدادات المجموعة -->
<div class="modal-bg" id="groupSettingsModal">
  <div class="modal-box">
    <div class="modal-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span id="settingsTitle">إعدادات المجموعة</span>
    </div>
    <div style="display:flex;justify-content:center;margin-bottom:14px;">
      <div id="gsAvatarPreview" onclick="document.getElementById('gsAvatarFile').click()" style="width:76px;height:76px;border-radius:50%;background:var(--avatar-gradient);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;font-weight:800;font-size:1.6rem;color:#fff;position:relative;border:2px solid var(--border);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute;bottom:2px;left:2px;background:rgba(0,0,0,0.55);border-radius:50%;padding:4px;color:#fff;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <input type="file" id="gsAvatarFile" accept="image/*" style="display:none;" onchange="onGroupAvatarFile(event)">
    </div>
    <input class="m-input" type="text" id="gsName" placeholder="اسم المجموعة *">
    <input class="m-input" type="text" id="gsDesc" placeholder="وصف المجموعة (اختياري)">
    <div class="m-footer">
      <button class="btn-cancel" onclick="closeModal('groupSettingsModal')" id="gsCancelBtn">إلغاء</button>
      <button class="btn-confirm" id="gsSaveBtn" onclick="saveGroupSettings()"><span id="gsSaveText">حفظ</span></button>
    </div>
    <div style="border-top:1px solid var(--border);margin-top:18px;padding-top:14px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;">
      <button class="btn-confirm" onclick="leaveGroup()" id="leaveGroupBtn" style="background:rgba(128,128,128,0.12);color:var(--text);">مغادرة المجموعة</button>
      <button class="btn-confirm btn-danger" onclick="deleteGroupConfirm()" id="deleteGroupBtn" style="display:none;">حذف المجموعة</button>
    </div>
  </div>
</div>

<!-- إضافة عضو -->
<div class="modal-bg" id="addMemberModal">
  <div class="modal-box">
    <div class="modal-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span id="addMemberTitle">إضافة أعضاء</span>
    </div>
    <div id="addMemberOptions" style="max-height:280px;overflow-y:auto;margin-bottom:4px;"></div>
    <div class="m-footer">
      <button class="btn-cancel" onclick="closeModal('addMemberModal')" id="amCancelBtn">إلغاء</button>
      <button class="btn-confirm" id="amConfirmBtn" onclick="confirmAddMembers()"><span id="amConfirmText">إضافة</span></button>
    </div>
  </div>
</div>

<div class="modal-bg" id="reportMsgModal">
  <div class="modal-box">
    <div class="modal-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 2-3 4"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="reportMsgModalTitle">الإبلاغ عن رسالة</span>
    </div>
    <select id="reportMsgReason" class="m-input" style="margin-bottom:10px;">
      <option value="spam">محتوى مزعج / سبام</option>
      <option value="abuse">إساءة أو تنمر</option>
      <option value="nudity">محتوى غير لائق</option>
      <option value="other">سبب آخر</option>
    </select>
    <textarea id="reportMsgDetails" class="m-input" placeholder="تفاصيل إضافية (اختياري)" style="min-height:90px;resize:vertical;"></textarea>
    <div class="m-footer">
      <button class="btn-cancel" onclick="closeModal('reportMsgModal')">إلغاء</button>
      <button class="btn-confirm" id="reportMsgBtn" onclick="submitReportMsg()"><span>إرسال البلاغ</span></button>
    </div>
  </div>
</div>

<div class="wp-overlay" id="wallpaperModal">
  <div class="wp-box">
    <div class="wp-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <span>خلفية المنصة</span>
    </div>
    <p class="wp-desc">اختر صورة خلفية خاصة بك، مثل خلفية سطح المكتب — تتحول الواجهة لبطاقات زجاجية، ويتكيّف الثيم تلقائيًا مع ألوان الصورة.</p>
    <div class="wp-preview" id="wallpaperPreviewBox"><span id="wallpaperPreviewEmpty">لا توجد خلفية محددة</span></div>
    <input type="file" id="wallpaperFile" accept="image/*" style="display:none;" onchange="onWallpaperFile(event)">
    <button class="wp-upload-btn" onclick="document.getElementById('wallpaperFile').click()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      رفع صورة خلفية
    </button>
    <div class="wp-row">
      <label><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 2v10l7 4"/></svg> تمويه الخلفية</label>
      <input type="range" id="wallpaperBlurRange" min="0" max="30" value="6" oninput="updateWallpaperTuning()">
    </div>
    <div class="wp-row">
      <label><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg> إضاءة التراكب</label>
      <input type="range" id="wallpaperDimRange" min="0" max="80" value="35" oninput="updateWallpaperTuning()">
    </div>
    <label class="wp-check"><input type="checkbox" id="wallpaperAutoTheme" checked onchange="updateWallpaperTuning()"> تغيير الثيم تلقائيًا حسب ألوان الخلفية</label>
    <div class="wp-footer">
      <button class="wp-btn-ghost" onclick="removeWallpaper()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        إزالة الخلفية
      </button>
      <button class="wp-btn-primary" onclick="document.getElementById('wallpaperModal').classList.remove('show')">تم</button>
    </div>
  </div>
</div>

<div class="img-viewer-overlay" id="imgViewerOverlay" onclick="closeImgViewer(event)">
  <div class="img-viewer-topbar">
    <button class="iv-btn" onclick="closeImgViewer(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      إغلاق
    </button>
    <button class="iv-btn" onclick="saveViewerImage(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      حفظ
    </button>
  </div>
  <img class="img-viewer-img" id="imgViewerImg" src="" alt="" onclick="event.stopPropagation()">
</div>
  <script src="/script.js" defer></script>
</body>
</html>
