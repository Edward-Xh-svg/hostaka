<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" href="hostaka-icon.png" type="image/png">
  <title>Hostaka — المجموعة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
    --black:#ffffff;
    --dark:#f7f7f8;
    --card:#ffffff;
    --border:#e5e5e5;
    --text:#1a1a1a;
    --muted:#6b7280;
    --red:#000000;
    --red-h:#333333;
    --accent:#000000;
    --mine-bg:rgba(0,0,0,0.08);
    --mine-border:rgba(0,0,0,0.12);
    --their-bg:rgba(0,0,0,0.04);
    --their-border:rgba(0,0,0,0.06);
}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--black);color:var(--text);font-family:'Cairo',sans-serif;display:flex;flex-direction:column;}

    .topbar{height:56px;background:rgba(255,255,255,0.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:20;}
    .back-btn{display:flex;align-items:center;gap:5px;color:#666;font-size:0.82rem;cursor:pointer;padding:6px 10px;border-radius:8px;background:none;border:none;font-family:'Cairo';transition:0.18s;}
    .back-btn:hover{color:#1a1a1a;background:rgba(0,0,0,0.04);}
    .group-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(145deg,var(--red),#333333);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;color:#1a1a1a;overflow:hidden;flex-shrink:0;}
    .group-av img{width:100%;height:100%;object-fit:cover;}
    .group-info{flex:1;min-width:0;}
    .group-name{font-weight:800;font-size:0.92rem;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .group-count{font-size:0.7rem;color:var(--muted);}
    .btn-settings{width:36px;height:36px;background:rgba(0,0,0,0.03);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#666;transition:0.18s;flex-shrink:0;}
    .btn-settings:hover{background:rgba(0,0,0,0.06);color:#1a1a1a;}

    .layout{display:flex;flex:1;overflow:hidden;}

    /* Messages */
    .msgs-main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
    .msgs-area{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:3px;min-height:0;}
    .msgs-area::-webkit-scrollbar{width:3px;}
    .msgs-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.04);border-radius:3px;}

    .date-div{text-align:center;font-size:0.7rem;color:var(--muted);padding:8px 0;position:relative;}
    .date-div::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);}
    .date-div span{position:relative;background:var(--black);padding:0 10px;}

    .msg-row{display:flex;align-items:flex-end;gap:7px;margin-bottom:6px;}
    .msg-row.mine{flex-direction:row-reverse;}
    .msg-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(145deg,var(--red),#333333);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.72rem;color:#1a1a1a;flex-shrink:0;overflow:hidden;cursor:pointer;}
    .msg-av img{width:100%;height:100%;object-fit:cover;}
    .msg-av.hidden{opacity:0;pointer-events:none;}
    .bubble-col{display:flex;flex-direction:column;max-width:70%;}
    .msg-row.mine .bubble-col{align-items:flex-end;}
    .msg-sender{font-size:0.72rem;color:var(--muted);margin-bottom:2px;padding:0 4px;}
    .bubble{padding:9px 12px;border-radius:16px;font-size:0.88rem;line-height:1.5;word-break:break-word;position:relative;cursor:pointer;}
    .msg-row.mine  .bubble{background:var(--mine-bg);border:1px solid var(--mine-border);border-bottom-left-radius:4px;}
    .msg-row.theirs .bubble{background:var(--their-bg);border:1px solid var(--their-border);border-bottom-right-radius:4px;}
    .bubble:hover{filter:brightness(1.1);}
    .bubble-img{max-width:100%;border-radius:10px;display:block;margin-bottom:4px;max-height:200px;object-fit:cover;}
    .msg-time{font-size:0.63rem;color:var(--muted);padding:2px 4px;}
    .msg-react-strip{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;}
    .msg-react-pill{display:inline-flex;align-items:center;gap:2px;background:rgba(250,250,250,0.95);border:1px solid var(--border);border-radius:999px;padding:2px 7px;font-size:0.75rem;cursor:pointer;}
    .react-picker{position:absolute;bottom:calc(100% + 6px);background:rgba(255,255,255,0.98);border:1px solid var(--border);border-radius:999px;padding:5px 8px;display:none;gap:3px;backdrop-filter:blur(20px);z-index:30;}
    .msg-row.mine .react-picker{right:0;}
    .msg-row.theirs .react-picker{left:0;}
    .react-picker.show{display:flex;}
    .r-emoji{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:3px 5px;border-radius:7px;transition:0.15s;line-height:1;}
    .r-emoji:hover{background:rgba(0,0,0,0.06);transform:scale(1.2);}

    .input-area{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,0.9);flex-shrink:0;}
    .msg-input{flex:1;padding:10px 14px;background:rgba(0,0,0,0.04);border:1px solid var(--border);border-radius:22px;color:#1a1a1a;font-family:'Cairo';font-size:0.9rem;resize:none;max-height:100px;overflow-y:auto;outline:none;line-height:1.5;}
    .msg-input:focus{border-color:rgba(0,0,0,0.18);}
    .btn-attach{width:38px;height:38px;background:rgba(0,0,0,0.04);border:1px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#666;transition:0.18s;flex-shrink:0;}
    .btn-attach:hover{color:#1a1a1a;background:rgba(0,0,0,0.06);}
    .btn-send{width:40px;height:40px;background:#111;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.18s;flex-shrink:0;}
    .btn-send:hover{background:var(--red-h);}
    .btn-send:disabled{opacity:0.4;cursor:not-allowed;}
    .img-preview-bar{padding:6px 12px;background:rgba(255,255,255,0.8);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
    .img-preview-bar img{height:52px;border-radius:7px;object-fit:cover;}
    .img-rm{background:rgba(0,0,0,0.7);border:none;color:#1a1a1a;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:0.7rem;display:flex;align-items:center;justify-content:center;}

    /* Settings Panel */
    .settings-panel{width:280px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:rgba(255,255,255,0.7);transform:translateX(100%);transition:0.25s;position:absolute;top:56px;left:0;bottom:0;z-index:10;}
    .settings-panel.open{transform:translateX(0);}
    .sp-head{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:800;font-size:0.9rem;color:#1a1a1a;display:flex;align-items:center;justify-content:space-between;}
    .sp-close{background:none;border:none;color:#666;cursor:pointer;padding:4px;}
    .sp-body{flex:1;overflow-y:auto;padding:12px;}
    .sp-section{margin-bottom:18px;}
    .sp-label{font-size:0.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
    .sp-input{width:100%;padding:9px 12px;background:#f7f7f8;border:1px solid rgba(0,0,0,0.1);border-radius:8px;color:#1a1a1a;font-family:'Cairo';font-size:0.86rem;margin-bottom:8px;}
    .sp-input:focus{outline:none;border-color:rgba(0,0,0,0.18);}
    .sp-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;background:rgba(0,0,0,0.03);border:1px solid var(--border);border-radius:8px;color:#444;cursor:pointer;font-family:'Cairo';font-size:0.84rem;margin-bottom:6px;transition:0.15s;}
    .sp-btn:hover{background:rgba(0,0,0,0.06);color:#1a1a1a;}
    .sp-btn-red{color:#111;border-color:rgba(0,0,0,0.2);background:rgba(0,0,0,0.06);}
    .sp-btn-red:hover{background:rgba(0,0,0,0.14);}
    .member-item{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
    .m-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(145deg,var(--red),#333333);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;color:#1a1a1a;flex-shrink:0;overflow:hidden;}
    .m-av img{width:100%;height:100%;object-fit:cover;}
    .m-name{font-size:0.84rem;color:#1a1a1a;flex:1;}
    .m-role{font-size:0.68rem;color:var(--muted);}
    .theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px;}
    .theme-dot{width:100%;aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:0.15s;}
    .theme-dot.active{border-color:#1a1a1a;}

    @media(max-width:680px){.settings-panel{width:100%;}}
  </style>
<base target="_blank">
</head>
<body>

<div class="topbar">
  <a href="/chat" class="back-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="group-av" id="groupAv"></div>
  <div class="group-info">
    <div class="group-name" id="groupName">...</div>
    <div class="group-count" id="groupCount"></div>
  </div>
  <button class="btn-settings" onclick="toggleSettings()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M21 12h-2M5 12H3M12 21v-2M12 5V3"/></svg>
  </button>
</div>

<div class="layout" id="layout">
  <div class="msgs-main">
    <div class="msgs-area" id="msgsArea">
      <div style="text-align:center;color:var(--muted);padding:40px;font-size:0.85rem;">جارٍ التحميل...</div>
    </div>
    <div id="imgPreviewBar" style="display:none;" class="img-preview-bar">
      <img id="imgPreviewThumb" src="" alt="">
      <button class="img-rm" onclick="removeImg()">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span style="font-size:0.78rem;color:var(--muted);">صورة مرفقة</span>
    </div>
    <div class="input-area">
      <button class="btn-attach" onclick="document.getElementById('imgFile').click()" title="إرفاق صورة">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <input type="file" id="imgFile" accept=".jpg,.jpeg,image/jpeg" style="display:none;" onchange="onImg(event)">
      <textarea class="msg-input" id="msgInput" placeholder="اكتب رسالة..." rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMsg()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="sp-head">
      إعدادات المجموعة
      <button class="sp-close" onclick="toggleSettings()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sp-body" id="spBody">
      <div style="text-align:center;color:var(--muted);padding:20px;font-size:0.85rem;">جارٍ التحميل...</div>
    </div>
  </div>
</div>

<script>
const getToken = ()=> localStorage.getItem('hostaka_token')||'';
const gid = new URLSearchParams(location.search).get('g');
const EMOJIS = ['❤️','😄','😢','😠','👍'];
const THEMES = [
  {name:'default', color:'#111111'},
  {name:'orange',  color:'#e67e22'},
  {name:'yellow',  color:'#f1c40f'},
  {name:'green',   color:'#2ecc71'},
  {name:'emerald', color:'#1abc9c'},
  {name:'blue',    color:'#3498db'},
  {name:'purple',  color:'#9b59b6'},
  {name:'pink',    color:'#e91e63'},
];

let ME = null, GROUP = null, MEMBERS = [], myImgBase64 = '', pollTimer = null, settingsOpen = false;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(s){ if(!s) return ''; return new Date(s).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'}); }
function fmtDay(s){ if(!s) return ''; const d=new Date(s), t=new Date(); const diff=Math.floor((t-d)/86400000); if(diff===0) return 'اليوم'; if(diff===1) return 'أمس'; return d.toLocaleDateString('ar-SA',{month:'short',day:'numeric'}); }

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}
function lightenHex(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
  r = Math.min(255, Math.floor(r + (255 - r) * pct));
  g = Math.min(255, Math.floor(g + (255 - g) * pct));
  b = Math.min(255, Math.floor(b + (255 - b) * pct));
  return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
}
function darkenHex(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
  r = Math.floor(r * (1 - pct));
  g = Math.floor(g * (1 - pct));
  b = Math.floor(b * (1 - pct));
  return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
}
function applyTheme(themeName) {
  const t = THEMES.find(x => x.name === themeName) || THEMES[0];
  const root = document.documentElement;
  root.style.setProperty('--red', t.color);
  root.style.setProperty('--red-h', lightenHex(t.color, 0.25));
  root.style.setProperty('--mine-bg', hexToRgba(t.color, 0.18));
  root.style.setProperty('--mine-border', hexToRgba(t.color, 0.28));
}

async function api(url,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(url,opts); return r.json();
}

(async function init(){
  if(!gid){ location.href='/chat'; return; }
  const token=getToken();
  if(!token){ location.href='/chat'; return; }
  try{
    const r=await fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});
    const u=await r.json(); if(!u||u.error){ location.href='/chat'; return; }
    ME=u;
  }catch(e){ location.href='/chat'; return; }
  await loadGroup();
  await loadMsgs();
  if(pollTimer) clearInterval(pollTimer);
  pollTimer=setInterval(loadMsgs,4000);
})();

async function loadGroup(){
  try{
    const d=await api('/api/groups/'+gid);
    if(d.error){ location.href='/chat'; return; }
    GROUP=d; MEMBERS=d.members||[];
    applyTheme(GROUP.theme || 'default');
    const av=document.getElementById('groupAv');
    av.innerHTML=d.avatar?`<img src="${esc(d.avatar)}" alt="">`:(d.name||'?').charAt(0).toUpperCase();
    document.getElementById('groupName').textContent=d.name||'مجموعة';
    document.getElementById('groupCount').textContent=MEMBERS.length+' عضو';
  }catch(e){}
}

async function loadMsgs(){
  try{
    const msgs=await api('/api/groups/'+gid+'/messages');
    if(!Array.isArray(msgs)) return;
    renderMsgs(msgs);
  }catch(e){}
}

function renderMsgs(msgs){
  const area=document.getElementById('msgsArea');
  if(!msgs.length){ area.innerHTML='<div style="text-align:center;color:var(--muted);padding:30px;font-size:0.85rem;">لا توجد رسائل بعد</div>'; return; }
  const scrolledToBottom=area.scrollHeight-area.scrollTop-area.clientHeight<60;
  let html='', lastDay='';
  msgs.forEach((m,i)=>{
    const isMine=m.user_id==ME?.id;
    const day=fmtDay(m.created_at);
    if(day!==lastDay){ html+=`<div class="date-div"><span>${day}</span></div>`; lastDay=day; }
    const next=msgs[i+1]; const isLast=!next||next.user_id!=m.user_id;
    const av=m.from_avatar?`<img src="${esc(m.from_avatar)}" alt="">`:m.from_name.charAt(0).toUpperCase();
    html+=`<div class="msg-row ${isMine?'mine':'theirs'}">
      ${!isMine?`<div class="msg-av ${isLast?'':'hidden'}" onclick="window.location='/profile?u='+encodeURIComponent('${esc(m.from_name)}')">${av}</div>`:''}
      <div class="bubble-col">
        ${!isMine&&isLast?`<div class="msg-sender">${esc(m.from_name)}</div>`:''}
        <div class="bubble" id="b-${m.id}" onclick="togglePicker(${m.id})">
          ${m.image?`<img class="bubble-img" src="${esc(m.image)}" loading="lazy" onerror="this.style.display='none'">`:''}
          ${m.content?esc(m.content):''}
          <div class="react-picker" id="rp-${m.id}">${EMOJIS.map(e=>`<button class="r-emoji" onclick="reactMsg(event,${m.id},'${e}')">${e}</button>`).join('')}</div>
        </div>
        ${isLast?`<div class="msg-time">${fmtTime(m.created_at)}</div>`:''}
      </div>
      ${isMine?`<div class="msg-av ${isLast?'':'hidden'}">${av}</div>`:''}
    </div>`;
  });
  area.innerHTML=html;
  if(scrolledToBottom) area.scrollTop=area.scrollHeight;
}

function togglePicker(id){ const p=document.getElementById('rp-'+id); if(!p) return; document.querySelectorAll('.react-picker.show').forEach(x=>{if(x!==p) x.classList.remove('show');}); p.classList.toggle('show'); }
document.addEventListener('click',e=>{ if(!e.target.closest('.bubble')) document.querySelectorAll('.react-picker.show').forEach(p=>p.classList.remove('show')); });

async function reactMsg(e,mid,emoji){
  e.stopPropagation();
  document.querySelectorAll('.react-picker.show').forEach(p=>p.classList.remove('show'));
  await api('/api/groups/'+gid+'/messages/'+mid+'/react','POST',{emoji});
  await loadMsgs();
}

function onImg(e){
  const f=e.target.files[0]; if(!f) return;
  if(!f.type.match('image/jpeg')){ alert('JPG/JPEG فقط'); return; }
  const r=new FileReader(); r.onload=ev=>{ myImgBase64=ev.target.result; document.getElementById('imgPreviewThumb').src=myImgBase64; document.getElementById('imgPreviewBar').style.display='flex'; }; r.readAsDataURL(f); e.target.value='';
}
function removeImg(){ myImgBase64=''; document.getElementById('imgPreviewBar').style.display='none'; }

async function sendMsg(){
  const input=document.getElementById('msgInput');
  const content=input?.value.trim()||'';
  if(!content&&!myImgBase64) return;
  input.value=''; input.style.height='';
  document.getElementById('sendBtn').disabled=true;
  try{
    let imageUrl='';
    if(myImgBase64){
      const up=await api('/api/upload','POST',{image:myImgBase64});
      if(up.url) imageUrl=up.url;
      removeImg();
    }
    await api('/api/groups/'+gid+'/messages','POST',{content,image:imageUrl});
    await loadMsgs();
  }catch(e){}
  document.getElementById('sendBtn').disabled=false;
}

function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

// ── Settings Panel ──
function toggleSettings(){
  settingsOpen=!settingsOpen;
  document.getElementById('settingsPanel').classList.toggle('open',settingsOpen);
  if(settingsOpen) renderSettings();
}

function renderSettings(){
  const myRole=MEMBERS.find(m=>m.user_id==ME?.id)?.role||'member';
  const isAdmin=myRole==='admin'||myRole==='moderator';
  const spBody=document.getElementById('spBody');
  spBody.innerHTML=`
    ${isAdmin?`
    <div class="sp-section">
      <div class="sp-label">اسم المجموعة</div>
      <input class="sp-input" type="text" id="spName" value="${esc(GROUP?.name||'')}" placeholder="اسم المجموعة">
      <button class="sp-btn" onclick="saveGroupInfo()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>
        حفظ
      </button>
    </div>`:``}
    <div class="sp-section">
      <div class="sp-label">الثيم</div>
      <div class="theme-grid">
        ${THEMES.map(t=>`<div class="theme-dot ${GROUP?.theme===t.name?'active':''}" style="background:linear-gradient(135deg,${t.color},${darkenHex(t.color,0.25)});" onclick="setTheme('${t.name}')" title="${t.name}"></div>`).join('')}
      </div>
    </div>
    <div class="sp-section">
      <div class="sp-label">الأعضاء (${MEMBERS.length})</div>
      ${MEMBERS.map(m=>{
        const mv=m.user_id==ME?.id;
        const mav=m.avatar?`<img src="${esc(m.avatar)}" alt="">`:esc((m.display_name||m.username||'?').charAt(0).toUpperCase());
        return `<div class="member-item">
          <div class="m-av" onclick="window.location='/profile?u='+encodeURIComponent('${esc(m.username)}')">${mav}</div>
          <div style="flex:1;min-width:0;">
            <div class="m-name">${esc(m.nickname||m.display_name||m.username)}</div>
            <div class="m-role">${m.role==='admin'?'مدير':m.role==='moderator'?'مشرف':'عضو'}</div>
          </div>
          ${isAdmin&&!mv?`<button onclick="kickMember(${m.user_id})" style="background:none;border:none;color:#555;cursor:pointer;padding:4px;border-radius:5px;" title="إزالة"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`:''}
        </div>`;
      }).join('')}
      ${isAdmin?`<button class="sp-btn" style="margin-top:8px;" onclick="addMemberPrompt()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        إضافة عضو
      </button>`:''}
    </div>
    <div class="sp-section">
      <button class="sp-btn sp-btn-red" onclick="leaveGroup()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        مغادرة المجموعة
      </button>
    </div>`;
}

async function saveGroupInfo(){
  const name=document.getElementById('spName')?.value.trim();
  if(!name) return;
  await api('/api/groups/'+gid,'PUT',{name,description:GROUP?.description||'',avatar:GROUP?.avatar||'',theme:GROUP?.theme||'default'});
  await loadGroup(); renderSettings();
}

async function setTheme(theme){
  await api('/api/groups/'+gid,'PUT',{name:GROUP?.name,description:GROUP?.description||'',avatar:GROUP?.avatar||'',theme});
  GROUP.theme=theme;
  applyTheme(theme);
  renderSettings();
}

async function kickMember(uid){
  if(!confirm('إزالة هذا العضو؟')) return;
  await api('/api/groups/'+gid+'/members/'+uid,'DELETE');
  await loadGroup(); renderSettings();
}

async function addMemberPrompt(){
  const username=prompt('أدخل اسم المستخدم:');
  if(!username) return;
  const u=await fetch('/api/profile/'+encodeURIComponent(username)).then(r=>r.json());
  if(!u||u.error){ alert('المستخدم غير موجود'); return; }
  await api('/api/groups/'+gid+'/members','POST',{user_id:u.id,role:'member'});
  await loadGroup(); renderSettings();
}

async function leaveGroup(){
  if(!confirm('مغادرة المجموعة؟')) return;
  await api('/api/groups/'+gid+'/members/'+ME.id,'DELETE');
  location.href='/chat';
}
</script>
</body>
</html>
