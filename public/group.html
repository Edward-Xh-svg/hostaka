<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="icon" href="hostaka-icon.png" type="image/png">
  <title>Hostaka — المجموعة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --black:#ffffff;
      --dark:#f7f7f8;
      --card:#ffffff;
      --border:#e5e5e5;
      --text:#1a1a1a;
      --muted:#6b7280;
      --red:#000000;
      --red-h:#333333;
      --accent:#000000;
      --mine-bg:rgba(0,0,0,0.08);
      --mine-border:rgba(0,0,0,0.12);
      --their-bg:rgba(0,0,0,0.04);
      --their-border:rgba(0,0,0,0.06);
      --topbar-bg:rgba(255,255,255,0.95);
      --input-bg:#f7f7f8;
      --modal-bg:#ffffff;
      --shadow:0 8px 32px rgba(0,0,0,0.3);
      --avatar-gradient:linear-gradient(145deg, var(--red), #333333);
      --chat-bg:transparent;
    }
    [data-theme="dark"] {
      --black:#0d0d0d;
      --dark:#141414;
      --card:#1a1a1a;
      --border:#2a2a2a;
      --text:#e5e5e5;
      --muted:#8d8d8d;
      --red:#d4af37;
      --red-h:#e6c74a;
      --accent:#d4af37;
      --mine-bg:rgba(212,175,55,0.15);
      --mine-border:rgba(212,175,55,0.25);
      --their-bg:rgba(255,255,255,0.05);
      --their-border:rgba(255,255,255,0.08);
      --topbar-bg:rgba(13,13,13,0.95);
      --input-bg:#222222;
      --modal-bg:#1a1a1a;
      --shadow:0 8px 32px rgba(0,0,0,0.7);
      --avatar-gradient:linear-gradient(145deg, #d4af37, #b8962e);
    }

    /* ===== Chat Backgrounds ===== */
    [data-chat-bg="default"] .msgs-area { background: var(--black); }
    [data-chat-bg="gradient-blue"] .msgs-area { background: linear-gradient(135deg, #e0f7fa, #b2ebf2); }
    [data-chat-bg="gradient-green"] .msgs-area { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
    [data-chat-bg="gradient-pink"] .msgs-area { background: linear-gradient(135deg, #fce4ec, #f8bbd0); }
    [data-chat-bg="gradient-orange"] .msgs-area { background: linear-gradient(135deg, #fff3e0, #ffe0b2); }
    [data-chat-bg="gradient-purple"] .msgs-area { background: linear-gradient(135deg, #f3e5f5, #e1bee7); }
    [data-chat-bg="gradient-sunset"] .msgs-area { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
    [data-chat-bg="gradient-ocean"] .msgs-area { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); }
    [data-chat-bg="gradient-forest"] .msgs-area { background: linear-gradient(135deg, #d4fc79, #96e6a1); }
    [data-chat-bg="gradient-lavender"] .msgs-area { background: linear-gradient(135deg, #e8d5f5, #d4b8e8); }
    [data-chat-bg="dark"] .msgs-area { background: #1a1a1a; }
    [data-chat-bg="dark"] .msgs-area .date-div span { background: #1a1a1a; }
    [data-chat-bg="dark"] .msgs-area .bubble.theirs { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.08); }
    [data-chat-bg="dark"] .msgs-area .bubble.mine { background: rgba(212,175,55,0.12); border-color: rgba(212,175,55,0.2); }

    [data-theme="dark"] [data-chat-bg="gradient-blue"] .msgs-area { background: linear-gradient(135deg, #0d2137, #1a3a5c); }
    [data-theme="dark"] [data-chat-bg="gradient-green"] .msgs-area { background: linear-gradient(135deg, #0d2818, #1a4a2a); }
    [data-theme="dark"] [data-chat-bg="gradient-pink"] .msgs-area { background: linear-gradient(135deg, #2d1420, #4a1a2e); }
    [data-theme="dark"] [data-chat-bg="gradient-orange"] .msgs-area { background: linear-gradient(135deg, #2d1a0d, #4a2e14); }
    [data-theme="dark"] [data-chat-bg="gradient-purple"] .msgs-area { background: linear-gradient(135deg, #1a0d2d, #301a4a); }
    [data-theme="dark"] [data-chat-bg="gradient-sunset"] .msgs-area { background: linear-gradient(135deg, #2d1a0d, #4a2014); }
    [data-theme="dark"] [data-chat-bg="gradient-ocean"] .msgs-area { background: linear-gradient(135deg, #0d1a2d, #1a2d4a); }
    [data-theme="dark"] [data-chat-bg="gradient-forest"] .msgs-area { background: linear-gradient(135deg, #0d1a0d, #1a2d1a); }
    [data-theme="dark"] [data-chat-bg="gradient-lavender"] .msgs-area { background: linear-gradient(135deg, #1a0d2d, #2d1a40); }
    [data-theme="dark"] [data-chat-bg="default"] .msgs-area { background: #0d0d0d; }

    /* Fallback for dark mode date divider */
    [data-theme="dark"] .msgs-area .date-div span { background: var(--black); }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--black);color:var(--text);font-family:'Cairo',sans-serif;display:flex;flex-direction:column;transition:background 0.3s ease, color 0.3s ease;}

    .topbar{
      height:56px;
      background:var(--topbar-bg);
      backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      padding:0 14px;
      gap:10px;
      flex-shrink:0;
      z-index:20;
      transition:background 0.3s, border-color 0.3s;
    }
    .topbar-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
    .topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .back-btn{
      display:flex;
      align-items:center;
      gap:5px;
      color:var(--muted);
      font-size:0.82rem;
      cursor:pointer;
      padding:6px 10px;
      border-radius:8px;
      background:rgba(128,128,128,0.06);
      border:1px solid var(--border);
      font-family:'Cairo';
      transition:0.18s;
      text-decoration:none;
    }
    .back-btn:hover{color:var(--text);background:rgba(128,128,128,0.12);border-color:var(--border);}
    .back-btn:active{transform:scale(0.95);}
    .back-btn svg{width:14px;height:14px;}
    .group-av{
      width:36px;height:36px;
      border-radius:50%;
      background:var(--avatar-gradient);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:0.9rem;
      color:#fff;
      overflow:hidden;
      flex-shrink:0;
    }
    .group-av img{width:100%;height:100%;object-fit:cover;}
    .group-info{flex:1;min-width:0;}
    .group-name{font-weight:800;font-size:0.92rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .group-count{font-size:0.7rem;color:var(--muted);}

    .icon-btn{
      width:36px;height:36px;
      background:rgba(128,128,128,0.06);
      border:1px solid var(--border);
      border-radius:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      color:var(--muted);
      transition:0.18s;
      flex-shrink:0;
    }
    .icon-btn:hover{background:rgba(128,128,128,0.12);color:var(--text);border-color:var(--border);}
    .icon-btn svg{width:16px;height:16px;}

    .lang-selector{position:relative;}
    .lang-menu{
      position:absolute;
      top:42px;
      left:0;
      background:var(--modal-bg);
      border:1px solid var(--border);
      border-radius:12px;
      padding:6px 0;
      min-width:140px;
      opacity:0;
      visibility:hidden;
      transform:translateY(-6px) scale(0.96);
      transition:all 0.2s cubic-bezier(0.16,1,0.3,1);
      z-index:30;
      box-shadow:var(--shadow);
    }
    .lang-menu.show{opacity:1;visibility:visible;transform:translateY(0) scale(1);}
    .lang-menu button{
      display:flex;align-items:center;gap:8px;
      width:100%;padding:8px 16px;
      background:none;border:none;
      color:var(--text);
      font-family:'Cairo',sans-serif;
      font-size:0.85rem;
      cursor:pointer;
      transition:background 0.15s;
      text-align:right;
    }
    .lang-menu button:hover{background:rgba(128,128,128,0.08);}
    .lang-menu button .flag{font-size:1.1rem;}

    .layout{display:flex;flex:1;overflow:hidden;position:relative;}

    /* Messages */
    .msgs-main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
    .msgs-area{
      flex:1;
      overflow-y:auto;
      padding:14px 12px;
      display:flex;
      flex-direction:column;
      gap:3px;
      min-height:0;
      transition:background 0.4s ease;
      background:var(--chat-bg, transparent);
    }
    .msgs-area::-webkit-scrollbar{width:3px;}
    .msgs-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

    .date-div{text-align:center;font-size:0.7rem;color:var(--muted);padding:8px 0;position:relative;}
    .date-div::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);}
    .date-div span{position:relative;background:var(--black);padding:0 10px;}

    .msg-row{display:flex;align-items:flex-end;gap:7px;margin-bottom:6px;}
    .msg-row.mine{flex-direction:row-reverse;}
    .msg-av{
      width:28px;height:28px;
      border-radius:50%;
      background:var(--avatar-gradient);
      display:flex;align-items:center;justify-content:center;
      font-weight:700;font-size:0.72rem;color:#fff;
      flex-shrink:0;overflow:hidden;cursor:pointer;
    }
    .msg-av img{width:100%;height:100%;object-fit:cover;}
    .msg-av.hidden{opacity:0;pointer-events:none;}
    .bubble-col{display:flex;flex-direction:column;max-width:70%;}
    .msg-row.mine .bubble-col{align-items:flex-end;}
    .msg-sender{font-size:0.72rem;color:var(--muted);margin-bottom:2px;padding:0 4px;}
    .bubble{
      padding:9px 12px;
      border-radius:16px;
      font-size:0.88rem;
      line-height:1.5;
      word-break:break-word;
      position:relative;
      cursor:pointer;
    }
    .msg-row.mine  .bubble{background:var(--mine-bg);border:1px solid var(--mine-border);border-bottom-left-radius:4px;}
    .msg-row.theirs .bubble{background:var(--their-bg);border:1px solid var(--their-border);border-bottom-right-radius:4px;}
    .bubble:hover{filter:brightness(1.1);}
    .bubble-img{max-width:100%;border-radius:10px;display:block;margin-bottom:4px;max-height:200px;object-fit:cover;}
    .msg-time{font-size:0.63rem;color:var(--muted);padding:2px 4px;}
    .msg-react-strip{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;}
    .msg-react-pill{display:inline-flex;align-items:center;gap:2px;background:rgba(250,250,250,0.95);border:1px solid var(--border);border-radius:999px;padding:2px 7px;font-size:0.75rem;cursor:pointer;}
    .react-picker{position:absolute;bottom:calc(100% + 6px);background:var(--modal-bg);border:1px solid var(--border);border-radius:999px;padding:5px 8px;display:none;gap:3px;backdrop-filter:blur(20px);z-index:30;box-shadow:var(--shadow);}
    .msg-row.mine .react-picker{right:0;}
    .msg-row.theirs .react-picker{left:0;}
    .react-picker.show{display:flex;}
    .r-emoji{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:3px 5px;border-radius:7px;transition:0.15s;line-height:1;}
    .r-emoji:hover{background:rgba(128,128,128,0.08);transform:scale(1.2);}

    .input-area{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:8px;background:var(--topbar-bg);flex-shrink:0;}
    .msg-input{flex:1;padding:10px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:22px;color:var(--text);font-family:'Cairo';font-size:0.9rem;resize:none;max-height:100px;overflow-y:auto;outline:none;line-height:1.5;}
    .msg-input:focus{border-color:var(--border);background:var(--input-bg);box-shadow:0 0 0 3px rgba(128,128,128,0.08);}
    .msg-input::placeholder{color:var(--muted);}
    .btn-attach{width:38px;height:38px;background:rgba(128,128,128,0.06);border:1px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:0.18s;flex-shrink:0;}
    .btn-attach:hover{color:var(--text);background:rgba(128,128,128,0.12);border-color:var(--border);}
    .btn-send{width:40px;height:40px;background:var(--red);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.18s;flex-shrink:0;}
    .btn-send:hover{background:var(--red-h);}
    .btn-send:disabled{opacity:0.4;cursor:not-allowed;}
    .img-preview-bar{padding:6px 12px;background:var(--topbar-bg);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
    .img-preview-bar img{height:52px;border-radius:7px;object-fit:cover;border:1px solid var(--border);}
    .img-rm{background:rgba(0,0,0,0.7);border:none;color:#fff;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:0.7rem;display:flex;align-items:center;justify-content:center;}

    /* Settings Panel */
    .settings-panel{
      width:300px;
      border-left:1px solid var(--border);
      display:flex;
      flex-direction:column;
      transform:translateX(100%);
      transition:0.25s;
      position:absolute;
      top:0;
      left:0;
      bottom:0;
      z-index:10;
      background:var(--modal-bg);
    }
    .settings-panel.open{transform:translateX(0);}
    .sp-head{
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      font-weight:800;
      font-size:0.9rem;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .sp-close{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;}
    .sp-close:hover{color:var(--text);}
    .sp-body{flex:1;overflow-y:auto;padding:12px;}
    .sp-section{margin-bottom:18px;}
    .sp-label{font-size:0.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
    .sp-input{
      width:100%;padding:9px 12px;
      background:var(--input-bg);
      border:1px solid var(--border);
      border-radius:8px;
      color:var(--text);
      font-family:'Cairo';
      font-size:0.86rem;
      margin-bottom:8px;
    }
    .sp-input:focus{outline:none;border-color:var(--border);background:var(--input-bg);}
    .sp-btn{
      display:flex;
      align-items:center;
      gap:8px;
      width:100%;
      padding:9px 12px;
      background:rgba(128,128,128,0.06);
      border:1px solid var(--border);
      border-radius:8px;
      color:var(--muted);
      cursor:pointer;
      font-family:'Cairo';
      font-size:0.84rem;
      margin-bottom:6px;
      transition:0.15s;
    }
    .sp-btn:hover{background:rgba(128,128,128,0.12);color:var(--text);border-color:var(--border);}
    .sp-btn-red{color:var(--red);border-color:rgba(212,175,55,0.25);background:rgba(212,175,55,0.08);}
    .sp-btn-red:hover{background:rgba(212,175,55,0.15);}
    .member-item{
      display:flex;
      align-items:center;
      gap:9px;
      padding:8px 0;
      border-bottom:1px solid var(--border);
    }
    .m-av{
      width:32px;height:32px;
      border-radius:50%;
      background:var(--avatar-gradient);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      font-size:0.8rem;
      color:#fff;
      flex-shrink:0;
      overflow:hidden;
      cursor:pointer;
    }
    .m-av img{width:100%;height:100%;object-fit:cover;}
    .m-name{font-size:0.84rem;color:var(--text);flex:1;}
    .m-role{font-size:0.68rem;color:var(--muted);}
    .theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px;}
    .theme-dot{width:100%;aspect-ratio:1;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:0.15s;}
    .theme-dot.active{border-color:var(--text);}

    /* Background Grid */
    .bg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;}
    .bg-option{
      aspect-ratio:4/3;
      border-radius:10px;
      cursor:pointer;
      border:2px solid transparent;
      transition:0.2s;
      position:relative;
      overflow:hidden;
    }
    .bg-option:hover{transform:scale(1.03);}
    .bg-option.active{border-color:var(--red);box-shadow:0 0 0 2px var(--red);}
    .bg-option .bg-label{
      position:absolute;
      bottom:4px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(4px);
      padding:2px 8px;
      border-radius:4px;
      font-size:0.6rem;
      color:#fff;
      white-space:nowrap;
      font-weight:600;
    }
    /* Background previews */
    .bg-default{background:var(--black);}
    .bg-gradient-blue{background:linear-gradient(135deg,#e0f7fa,#b2ebf2);}
    .bg-gradient-green{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);}
    .bg-gradient-pink{background:linear-gradient(135deg,#fce4ec,#f8bbd0);}
    .bg-gradient-orange{background:linear-gradient(135deg,#fff3e0,#ffe0b2);}
    .bg-gradient-purple{background:linear-gradient(135deg,#f3e5f5,#e1bee7);}
    .bg-gradient-sunset{background:linear-gradient(135deg,#ffecd2,#fcb69f);}
    .bg-gradient-ocean{background:linear-gradient(135deg,#a1c4fd,#c2e9fb);}
    .bg-gradient-forest{background:linear-gradient(135deg,#d4fc79,#96e6a1);}
    .bg-gradient-lavender{background:linear-gradient(135deg,#e8d5f5,#d4b8e8);}
    .bg-dark{background:#1a1a1a;}
    [data-theme="dark"] .bg-default{background:#0d0d0d;}
    [data-theme="dark"] .bg-gradient-blue{background:linear-gradient(135deg,#0d2137,#1a3a5c);}
    [data-theme="dark"] .bg-gradient-green{background:linear-gradient(135deg,#0d2818,#1a4a2a);}
    [data-theme="dark"] .bg-gradient-pink{background:linear-gradient(135deg,#2d1420,#4a1a2e);}
    [data-theme="dark"] .bg-gradient-orange{background:linear-gradient(135deg,#2d1a0d,#4a2e14);}
    [data-theme="dark"] .bg-gradient-purple{background:linear-gradient(135deg,#1a0d2d,#301a4a);}
    [data-theme="dark"] .bg-gradient-sunset{background:linear-gradient(135deg,#2d1a0d,#4a2014);}
    [data-theme="dark"] .bg-gradient-ocean{background:linear-gradient(135deg,#0d1a2d,#1a2d4a);}
    [data-theme="dark"] .bg-gradient-forest{background:linear-gradient(135deg,#0d1a0d,#1a2d1a);}
    [data-theme="dark"] .bg-gradient-lavender{background:linear-gradient(135deg,#1a0d2d,#2d1a40);}
    [data-theme="dark"] .bg-dark{background:#0d0d0d;}

    .toast{
      position:fixed;bottom:24px;left:50%;
      transform:translateX(-50%) translateY(20px);
      padding:12px 22px;border-radius:14px;
      font-size:0.88rem;font-weight:600;
      z-index:999;
      border:1px solid var(--border);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      opacity:0;visibility:hidden;
      transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
      white-space:nowrap;max-width:90vw;text-align:center;
    }
    .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
    .toast-success{background:var(--modal-bg);color:var(--text);border-color:var(--border);}
    .toast-error{background:var(--red);color:#fff;border-color:var(--red);}

    @media(max-width:680px){.settings-panel{width:100%;}}
  </style>
<base target="_blank">
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="/chat" class="back-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="backText">الرسائل</span>
    </a>
    <div class="group-av" id="groupAv"></div>
    <div class="group-info">
      <div class="group-name" id="groupName">...</div>
      <div class="group-count" id="groupCount"></div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="تبديل الثيم">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(s){ if(!s) return ''; return new Date(s).toLocaleTimeString(currentLang === 'ar' ? 'ar' : 'en', {hour:'2-digit',minute:'2-digit'}); }
function fmtDay(s){
  if(!s) return '';
  const d=new Date(s), t=new Date();
  const diff=Math.floor((t-d)/86400000);
  if(diff===0) return t('today');
  if(diff===1) return t('yesterday');
  return d.toLocaleDateString(currentLang === 'ar' ? 'ar-SA' : 'en-US', {month:'short',day:'numeric'});
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}
function lightenHex(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
  r = Math.min(255, Math.floor(r + (255 - r) * pct));
  g = Math.min(255, Math.floor(g + (255 - g) * pct));
  b = Math.min(255, Math.floor(b + (255 - b) * pct));
  return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
}
function darkenHex(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
  r = Math.floor(r * (1 - pct));
  g = Math.floor(g * (1 - pct));
  b = Math.floor(b * (1 - pct));
  return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
}
function applyTheme(themeName) {
  const t = THEMES.find(x => x.name === themeName) || THEMES[0];
  const root = document.documentElement;
  root.style.setProperty('--red', t.color);
  root.style.setProperty('--red-h', lightenHex(t.color, 0.25));
  root.style.setProperty('--mine-bg', hexToRgba(t.color, 0.18));
  root.style.setProperty('--mine-border', hexToRgba(t.color, 0.28));
}

function applyBackground(bgId) {
  const layout = document.querySelector('.layout');
  if (bgId) {
    layout.setAttribute('data-chat-bg', bgId);
  } else {
    layout.removeAttribute('data-chat-bg');
  }
}

async function api(url,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(url,opts); return r.json();
}

function showToast(msg, type='success'){
  let t = document.querySelector('.toast');
  if(t) t.remove();
  t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 3000);
}

(async function init() {
  if (currentTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeToggle').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  }
  applyLang();

  if(!gid){ location.href='/chat'; return; }
  const token=getToken();
  if(!token){ location.href='/chat'; return; }
  try{
    const r=await fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});
    const u=await r.json(); if(!u||u.error){ location.href='/chat'; return; }
    ME=u;
  }catch(e){ location.href='/chat'; return; }
  await loadGroup();
  await loadMsgs();
  if(pollTimer) clearInterval(pollTimer);
  pollTimer=setInterval(loadMsgs,4000);
})();

async function loadGroup(){
  try{
    const d=await api('/api/groups/'+gid);
    if(d.error){ location.href='/chat'; return; }
    GROUP=d; MEMBERS=d.members||[];
    applyTheme(GROUP.theme || 'default');
    applyBackground(GROUP.background || 'default');
    const av=document.getElementById('groupAv');
    av.innerHTML=d.avatar?`<img src="${esc(d.avatar)}" alt="">`:(d.name||'?').charAt(0).toUpperCase();
    document.getElementById('groupName').textContent=d.name||'مجموعة';
    document.getElementById('groupCount').textContent=(d.members?d.members.length:0)+' '+t('members');
  }catch(e){}
}

async function loadMsgs(){
  try{
    const msgs=await api('/api/groups/'+gid+'/messages');
    if(!Array.isArray(msgs)) return;
    renderMsgs(msgs);
  }catch(e){}
}

function renderMsgs(msgs){
  const area=document.getElementById('msgsArea');
  if(!msgs.length){ area.innerHTML='<div style="text-align:center;color:var(--muted);padding:30px;font-size:0.85rem;">'+t('noMessages')+'</div>'; return; }
  const scrolledToBottom=area.scrollHeight-area.scrollTop-area.clientHeight<60;
  let html='', lastDay='';
  msgs.forEach((m,i)=>{
    const isMine=m.user_id==ME?.id;
    const day=fmtDay(m.created_at);
    if(day!==lastDay){ html+=`<div class="date-div"><span>${day}</span></div>`; lastDay=day; }
    const next=msgs[i+1]; const isLast=!next||next.user_id!=m.user_id;
    const av=m.from_avatar?`<img src="${esc(m.from_avatar)}" alt="">`:m.from_name.charAt(0).toUpperCase();
    html+=`<div class="msg-row ${isMine?'mine':'theirs'}">
      ${!isMine?`<div class="msg-av ${isLast?'':'hidden'}" onclick="window.location='/profile?u='+encodeURIComponent('${esc(m.from_name)}')">${av}</div>`:''}
      <div class="bubble-col">
        ${!isMine&&isLast?`<div class="msg-sender">${esc(m.from_name)}</div>`:''}
        <div class="bubble" id="b-${m.id}" onclick="togglePicker(${m.id})">
          ${m.image?`<img class="bubble-img" src="${esc(m.image)}" loading="lazy" onerror="this.style.display='none'">`:''}
          ${m.content?esc(m.content):''}
          <div class="react-picker" id="rp-${m.id}">${EMOJIS.map(e=>`<button class="r-emoji" onclick="reactMsg(event,${m.id},'${e}')">${e}</button>`).join('')}</div>
        </div>
        ${isLast?`<div class="msg-time">${fmtTime(m.created_at)}</div>`:''}
      </div>
      ${isMine?`<div class="msg-av ${isLast?'':'hidden'}">${av}</div>`:''}
    </div>`;
  });
  area.innerHTML=html;
  if(scrolledToBottom) area.scrollTop=area.scrollHeight;
}

function togglePicker(id){ const p=document.getElementById('rp-'+id); if(!p) return; document.querySelectorAll('.react-picker.show').forEach(x=>{if(x!==p) x.classList.remove('show');}); p.classList.toggle('show'); }
document.addEventListener('click',e=>{ if(!e.target.closest('.bubble')) document.querySelectorAll('.react-picker.show').forEach(p=>p.classList.remove('show')); });

async function reactMsg(e,mid,emoji){
  e.stopPropagation();
  document.querySelectorAll('.react-picker.show').forEach(p=>p.classList.remove('show'));
  await api('/api/groups/'+gid+'/messages/'+mid+'/react','POST',{emoji});
  await loadMsgs();
}

function onImg(e){
  const f=e.target.files[0]; if(!f) return;
  if(!f.type.match('image/jpeg')){ showToast('JPG/JPEG فقط','error'); return; }
  const r=new FileReader(); r.onload=ev=>{ myImgBase64=ev.target.result; document.getElementById('imgPreviewThumb').src=myImgBase64; document.getElementById('imgPreviewBar').style.display='flex'; }; r.readAsDataURL(f); e.target.value='';
}
function removeImg(){ myImgBase64=''; document.getElementById('imgPreviewBar').style.display='none'; }

async function sendMsg(){
  const input=document.getElementById('msgInput');
  const content=input?.value.trim()||'';
  if(!content&&!myImgBase64) return;
  input.value=''; input.style.height='';
  document.getElementById('sendBtn').disabled=true;
  try{
    let imageUrl='';
    if(myImgBase64){
      const up=await api('/api/upload','POST',{image:myImgBase64});
      if(up.url) imageUrl=up.url;
      removeImg();
    }
    await api('/api/groups/'+gid+'/messages','POST',{content,image:imageUrl});
    await loadMsgs();
  }catch(e){}
  document.getElementById('sendBtn').disabled=false;
}

function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

// ── Settings Panel ──
function toggleSettings(){
  settingsOpen=!settingsOpen;
  document.getElementById('settingsPanel').classList.toggle('open',settingsOpen);
  if(settingsOpen) renderSettings();
}

function renderSettings(){
  const myRole=MEMBERS.find(m=>m.user_id==ME?.id)?.role||'member';
  const isAdmin=myRole==='admin'||myRole==='moderator';
  const currentBg = GROUP?.background || 'default';
  const spBody=document.getElementById('spBody');
  spBody.innerHTML=`
    ${isAdmin?`
    <div class="sp-section">
      <div class="sp-label">${t('groupName')}</div>
      <input class="sp-input" type="text" id="spName" value="${esc(GROUP?.name||'')}" placeholder="${t('groupName')}">
      <button class="sp-btn" onclick="saveGroupInfo()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>
        ${t('save')}
      </button>
    </div>`:``}
    <div class="sp-section">
      <div class="sp-label">${t('theme')}</div>
      <div class="theme-grid">
        ${THEMES.map(t=>`<div class="theme-dot ${GROUP?.theme===t.name?'active':''}" style="background:linear-gradient(135deg,${t.color},${darkenHex(t.color,0.25)});" onclick="setTheme('${t.name}')" title="${t.name}"></div>`).join('')}
      </div>
    </div>
    <div class="sp-section">
      <div class="sp-label">${t('chatBackground')}</div>
      <div class="bg-grid">
        ${CHAT_BACKGROUNDS.map(bg=>`
          <div class="bg-option ${currentBg===bg.id?'active':''} bg-${bg.id}" onclick="setBackground('${bg.id}')" title="${t(bg.label)}">
            <span class="bg-label">${t(bg.label)}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="sp-section">
      <div class="sp-label">${t('members')} (${MEMBERS.length})</div>
      ${MEMBERS.map(m=>{
        const mv=m.user_id==ME?.id;
        const mav=m.avatar?`<img src="${esc(m.avatar)}" alt="">`:esc((m.display_name||m.username||'?').charAt(0).toUpperCase());
        const roleLabel = m.role==='admin' ? t('admin') : (m.role==='moderator' ? t('moderator') : t('member'));
        return `<div class="member-item">
          <div class="m-av" onclick="window.location='/profile?u='+encodeURIComponent('${esc(m.username)}')">${mav}</div>
          <div style="flex:1;min-width:0;">
            <div class="m-name">${esc(m.nickname||m.display_name||m.username)}</div>
            <div class="m-role">${roleLabel}</div>
          </div>
          ${isAdmin&&!mv?`<button onclick="kickMember(${m.user_id})" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:5px;" title="${t('memberRemoved')}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`:''}
        </div>`;
      }).join('')}
      ${isAdmin?`<button class="sp-btn" style="margin-top:8px;" onclick="addMemberPrompt()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        ${t('addMember')}
      </button>`:''}
    </div>
    <div class="sp-section">
      <button class="sp-btn sp-btn-red" onclick="leaveGroup()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        ${t('leaveGroup')}
      </button>
    </div>`;
}

async function saveGroupInfo(){
  const name=document.getElementById('spName')?.value.trim();
  if(!name) return;
  await api('/api/groups/'+gid,'PUT',{
    name,
    description:GROUP?.description||'',
    avatar:GROUP?.avatar||'',
    theme:GROUP?.theme||'default',
    background:GROUP?.background||'default'
  });
  await loadGroup(); renderSettings();
  showToast(t('groupUpdated'));
}

async function setTheme(theme){
  await api('/api/groups/'+gid,'PUT',{
    name:GROUP?.name,
    description:GROUP?.description||'',
    avatar:GROUP?.avatar||'',
    theme,
    background:GROUP?.background||'default'
  });
  GROUP.theme=theme;
  applyTheme(theme);
  renderSettings();
  showToast(t('themeChanged'));
}

async function setBackground(bgId){
  await api('/api/groups/'+gid,'PUT',{
    name:GROUP?.name,
    description:GROUP?.description||'',
    avatar:GROUP?.avatar||'',
    theme:GROUP?.theme||'default',
    background:bgId
  });
  GROUP.background=bgId;
  applyBackground(bgId);
  renderSettings();
  showToast(t('backgroundChanged'));
}

async function kickMember(uid){
  if(!confirm(t('confirmKick'))) return;
  await api('/api/groups/'+gid+'/members/'+uid,'DELETE');
  await loadGroup(); renderSettings();
  showToast(t('memberRemoved'));
}

async function addMemberPrompt(){
  const username=prompt(t('addMember')+':');
  if(!username) return;
  const u=await fetch('/api/profile/'+encodeURIComponent(username)).then(r=>r.json());
  if(!u||u.error){ showToast('المستخدم غير موجود','error'); return; }
  await api('/api/groups/'+gid+'/members','POST',{user_id:u.id,role:'member'});
  await loadGroup(); renderSettings();
  showToast(t('memberAdded'));
}

async function leaveGroup(){
  if(!confirm(t('confirmLeave'))) return;
  await api('/api/groups/'+gid+'/members/'+ME.id,'DELETE');
  showToast(t('leftGroup'));
  location.href='/chat';
}
</script>
</body>
</html>
