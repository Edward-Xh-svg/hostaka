<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="hostaka-icon.png" type="image/png">
  <title>Hostaka — المجموعة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #ffffff;
      --dark: #f7f7f8;
      --card: #ffffff;
      --border: #e5e5e5;
      --text: #1a1a1a;
      --muted: #6b7280;
      --red: #000000;
      --red-h: #333333;
      --accent: #000000;
      --mine-bg: rgba(0,0,0,0.08);
      --mine-border: rgba(0,0,0,0.12);
      --their-bg: rgba(0,0,0,0.04);
      --their-border: rgba(0,0,0,0.06);
      --topbar-bg: rgba(255,255,255,0.85);
      --input-bg: #f7f7f8;
      --modal-bg: #ffffff;
      --shadow: 0 10px 30px rgba(0,0,0,0.4);
      --avatar-gradient: linear-gradient(145deg, var(--red), #333333);
      --sidebar-bg: rgba(255,255,255,0.6);
    }
    [data-theme="dark"] {
      --black: #0d0d0d;
      --dark: #141414;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --muted: #8d8d8d;
      --red: #d4af37;
      --red-h: #e6c74a;
      --accent: #d4af37;
      --mine-bg: rgba(212,175,55,0.15);
      --mine-border: rgba(212,175,55,0.25);
      --their-bg: rgba(255,255,255,0.05);
      --their-border: rgba(255,255,255,0.08);
      --topbar-bg: rgba(13,13,13,0.85);
      --input-bg: #222222;
      --modal-bg: #1a1a1a;
      --shadow: 0 10px 30px rgba(0,0,0,0.7);
      --avatar-gradient: linear-gradient(145deg, #d4af37, #b8962e);
      --sidebar-bg: rgba(20,20,20,0.8);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{
      background:radial-gradient(circle at 18% 16%,rgba(0,0,0,0.05),transparent 22%),var(--black);
      color:var(--text);font-family:'Cairo',sans-serif;
      display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;
      transition:background 0.3s, color 0.3s;
    }
    .topbar{
      height:56px;background:var(--topbar-bg);
      backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 16px;gap:10px;
      flex-shrink:0;z-index:20;transition:background 0.3s, border-color 0.3s;
    }
    .topbar-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
    .topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .back-btn{
      display:flex;align-items:center;gap:6px;color:var(--muted);font-size:0.82rem;cursor:pointer;
      padding:6px 12px;border-radius:999px;background:rgba(128,128,128,0.06);
      border:1px solid var(--border);font-family:'Cairo';font-weight:600;
      text-decoration:none;white-space:nowrap;transition:all 0.18s;
    }
    .back-btn:hover{color:var(--text);background:rgba(128,128,128,0.12);}
    .back-btn:active{transform:scale(0.95);}
    .back-btn svg{width:14px;height:14px;}
    .icon-btn{
      width:36px;height:36px;border-radius:50%;background:rgba(128,128,128,0.06);
      border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:var(--muted);transition:all 0.2s;flex-shrink:0;
    }
    .icon-btn:hover,.icon-btn:active{background:rgba(128,128,128,0.12);color:var(--text);}
    .icon-btn svg{width:16px;height:16px;}
    .lang-selector{position:relative;}
    .lang-menu{
      position:absolute;top:42px;left:0;background:var(--modal-bg);
      border:1px solid var(--border);border-radius:12px;padding:6px 0;min-width:140px;
      opacity:0;visibility:hidden;transform:translateY(-6px) scale(0.96);
      transition:all 0.2s cubic-bezier(0.16,1,0.3,1);z-index:30;box-shadow:var(--shadow);
    }
    .lang-menu.show{opacity:1;visibility:visible;transform:translateY(0) scale(1);}
    .lang-menu button{
      display:flex;align-items:center;gap:8px;width:100%;padding:8px 16px;
      background:none;border:none;color:var(--text);font-family:'Cairo',sans-serif;
      font-size:0.85rem;cursor:pointer;transition:background 0.15s;text-align:right;
    }
    .lang-menu button:hover{background:rgba(128,128,128,0.08);}
    .lang-menu button .flag{font-size:1.1rem;}
    .topbar-peer{
      display:flex;align-items:center;gap:10px;flex:1;min-width:0;
      cursor:pointer;padding:4px;border-radius:10px;transition:background 0.15s;
    }
    .topbar-peer:hover{background:rgba(128,128,128,0.06);}
    .topbar-peer-av{
      width:34px;height:34px;border-radius:50%;background:var(--avatar-gradient);
      display:flex;align-items:center;justify-content:center;font-weight:800;
      font-size:0.9rem;color:#fff;overflow:hidden;flex-shrink:0;
      border:2px solid rgba(255,255,255,0.05);
    }
    .topbar-peer-av img{width:100%;height:100%;object-fit:cover;}
    .topbar-peer-name{font-weight:700;font-size:0.9rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .topbar-peer-role{font-size:0.7rem;color:var(--muted);}

    .chat-layout{display:flex;flex:1;overflow:hidden;}
    .sidebar{
      width:280px;display:flex;flex-direction:column;border-left:1px solid var(--border);
      background:var(--sidebar-bg);flex-shrink:0;transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .sidebar-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .sidebar-head-title{font-weight:800;font-size:0.88rem;color:var(--text);}
    .btn-add-member{
      display:flex;align-items:center;gap:5px;background:rgba(128,128,128,0.08);
      border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;
      cursor:pointer;font-family:'Cairo';font-size:0.78rem;font-weight:700;transition:all 0.18s;
    }
    .btn-add-member:hover{background:rgba(128,128,128,0.15);color:var(--text);}
    .btn-add-member svg{width:12px;height:12px;}
    .member-list{flex:1;overflow-y:auto;padding:6px 0;}
    .member-list::-webkit-scrollbar{width:4px;}
    .member-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    .member-item{
      display:flex;align-items:center;gap:10px;padding:10px 14px;
      transition:all 0.15s;border-radius:10px;margin:2px 8px;position:relative;
    }
    .member-item:hover{background:rgba(128,128,128,0.06);}
    .m-av{
      width:36px;height:36px;border-radius:50%;background:var(--avatar-gradient);
      display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.85rem;
      color:#fff;flex-shrink:0;overflow:hidden;border:2px solid rgba(255,255,255,0.05);cursor:pointer;
    }
    .m-av img{width:100%;height:100%;object-fit:cover;}
    .m-info{flex:1;min-width:0;cursor:pointer;}
    .m-name{font-weight:700;font-size:0.84rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .m-role{font-size:0.7rem;color:var(--muted);}
    .m-role.admin{color:var(--red);font-weight:700;}
    .m-actions{position:relative;flex-shrink:0;}
    .m-more{
      width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:var(--muted);transition:all 0.15s;
    }
    .m-more:hover{background:rgba(128,128,128,0.12);color:var(--text);}
    .m-menu{
      position:absolute;top:30px;left:0;background:var(--modal-bg);border:1px solid var(--border);
      border-radius:10px;padding:5px;min-width:130px;z-index:35;box-shadow:var(--shadow);
      display:none;flex-direction:column;
    }
    .m-menu.show{display:flex;}
    .m-menu button{
      background:none;border:none;color:var(--text);font-family:'Cairo';font-size:0.78rem;
      padding:7px 10px;text-align:right;border-radius:6px;cursor:pointer;transition:background 0.15s;
    }
    .m-menu button:hover{background:rgba(128,128,128,0.08);}
    .m-menu button.danger{color:#ef4444;}

    .chat-main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;position:relative;}
    .empty-state{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:14px;color:var(--muted);animation:fadeIn 0.5s ease;
    }
    .empty-state svg{width:52px;height:52px;opacity:0.15;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

    .msgs-area{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:4px;min-height:0;}
    .msgs-area::-webkit-scrollbar{width:4px;}
    .msgs-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    .date-divider{text-align:center;font-size:0.68rem;color:var(--muted);padding:10px 0;position:relative;font-weight:600;}
    .date-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);}
    .date-divider span{position:relative;z-index:1;background:var(--black);padding:0 12px;}
    .msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:6px;animation:msgIn 0.25s cubic-bezier(0.16,1,0.3,1);}
    @keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .msg-row.mine{flex-direction:row-reverse;}
    .msg-av{
      width:28px;height:28px;border-radius:50%;background:var(--avatar-gradient);
      display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.75rem;
      color:#fff;flex-shrink:0;overflow:hidden;border:2px solid rgba(255,255,255,0.05);
    }
    .msg-av img{width:100%;height:100%;object-fit:cover;}
    .msg-av.invisible{opacity:0;pointer-events:none;}
    .bubble-wrap{display:flex;flex-direction:column;max-width:68%;min-width:0;}
    .msg-row.mine .bubble-wrap{align-items:flex-end;}
    .sender-name{font-size:0.7rem;color:var(--muted);font-weight:700;margin:0 6px 2px;}
    .bubble{
      padding:10px 14px;border-radius:18px;font-size:0.9rem;line-height:1.6;
      word-break:break-word;position:relative;cursor:pointer;transition:filter 0.15s;
    }
    .bubble:hover{filter:brightness(1.12);}
    .msg-row.mine .bubble{background:var(--mine-bg);border:1px solid var(--mine-border);border-bottom-left-radius:5px;}
    .msg-row.theirs .bubble{background:var(--their-bg);border:1px solid var(--their-border);border-bottom-right-radius:5px;}
    .bubble-img{max-width:100%;border-radius:10px;display:block;margin-bottom:5px;max-height:180px;object-fit:cover;}
    .msg-time{font-size:0.62rem;color:var(--muted);padding:3px 5px;font-weight:600;}
    .msg-reaction{
      display:inline-flex;align-items:center;gap:4px;background:rgba(250,250,250,0.95);
      border:1px solid var(--border);border-radius:999px;padding:3px 8px;font-size:0.78rem;
      margin-top:4px;cursor:pointer;transition:all 0.15s;backdrop-filter:blur(10px);
    }
    .react-picker{
      position:absolute;bottom:calc(100% + 8px);background:var(--modal-bg);
      border:1px solid var(--border);border-radius:999px;padding:5px 8px;display:none;gap:3px;
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:30;
      white-space:nowrap;box-shadow:var(--shadow);animation:menuPop 0.2s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes menuPop{from{opacity:0;transform:translateY(6px) scale(0.9);}to{opacity:1;transform:translateY(0) scale(1);}}
    .msg-row.mine .react-picker{right:0;}
    .msg-row.theirs .react-picker{left:0;}
    .react-picker.show{display:flex;}
    .r-emoji{
      background:none;border:none;cursor:pointer;padding:5px 7px;border-radius:8px;
      transition:all 0.15s;line-height:1;display:flex;align-items:center;justify-content:center;color:var(--muted);
    }
    .r-emoji:hover{background:rgba(128,128,128,0.08);transform:scale(1.2);color:var(--text);}
    .r-emoji.active{background:rgba(212,175,55,0.15);color:var(--red);}
    .r-emoji svg{width:16px;height:16px;}

    .img-preview-bar{
      padding:8px 14px;background:var(--topbar-bg);border-top:1px solid var(--border);
      display:none;align-items:center;gap:10px;flex-shrink:0;animation:slideUp 0.2s ease;
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .img-preview-bar img{height:50px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
    .img-rm-btn{
      background:rgba(0,0,0,0.7);border:none;color:#fff;border-radius:50%;width:22px;height:22px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;
    }
    .input-area{
      padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:flex-end;
      gap:8px;background:var(--topbar-bg);flex-shrink:0;
    }
    .btn-attach{
      width:40px;height:40px;border-radius:50%;background:rgba(128,128,128,0.06);
      border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;
      color:var(--muted);transition:all 0.18s;flex-shrink:0;
    }
    .btn-attach:hover{color:var(--text);background:rgba(128,128,128,0.12);}
    .msg-input{
      flex:1;padding:11px 16px;background:var(--input-bg);border:1px solid var(--border);
      border-radius:20px;color:var(--text);font-family:'Cairo';font-size:0.9rem;
      resize:none;max-height:120px;line-height:1.5;transition:all 0.2s;
    }
    .msg-input:focus{outline:none;box-shadow:0 0 0 3px rgba(128,128,128,0.08);}
    .send-btn{
      width:40px;height:40px;border-radius:50%;flex-shrink:0;background:var(--red);
      border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all 0.2s;
    }
    .send-btn:hover{background:var(--red-h);transform:translateY(-2px);}
    .send-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .send-btn svg{width:17px;height:17px;}

    .sidebar-toggle{display:none;}

    .not-logged{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 20px;text-align:center;}
    .not-logged svg{width:44px;height:44px;color:var(--muted);}
    .not-logged h2{font-size:1.1rem;color:var(--text);font-weight:800;}
    .btn-go{margin-top:6px;display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;padding:10px 22px;border-radius:12px;text-decoration:none;font-weight:700;font-size:0.85rem;}

    .modal-bg{
      position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;visibility:hidden;
      transition:all 0.25s;
    }
    .modal-bg.show{opacity:1;visibility:visible;}
    .modal-box{
      background:var(--modal-bg);border:1px solid var(--border);border-radius:20px;
      padding:26px;width:min(420px,92%);max-height:82vh;overflow-y:auto;
      transform:translateY(14px) scale(0.97);transition:transform 0.25s cubic-bezier(0.16,1,0.3,1);
      box-shadow:var(--shadow);
    }
    .modal-bg.show .modal-box{transform:translateY(0) scale(1);}
    .modal-title{font-weight:800;font-size:1.05rem;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
    .modal-title svg{width:20px;height:20px;color:var(--red);}
    .m-input{
      width:100%;padding:11px 14px;background:var(--input-bg);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-family:'Cairo';font-size:0.9rem;margin-bottom:14px;transition:all 0.2s;
    }
    .m-input:focus{outline:none;box-shadow:0 0 0 3px rgba(128,128,128,0.08);}
    .member-check{
      display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(128,128,128,0.04);
      border-radius:10px;cursor:pointer;margin-bottom:6px;transition:all 0.15s;border:1px solid transparent;
    }
    .member-check:hover{background:rgba(128,128,128,0.08);border-color:var(--border);}
    .member-check input[type="checkbox"]{accent-color:var(--red);width:16px;height:16px;flex-shrink:0;}
    .m-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}
    .btn-cancel{
      padding:10px 18px;background:rgba(128,128,128,0.06);border:1px solid var(--border);
      border-radius:9px;color:var(--muted);cursor:pointer;font-family:'Cairo';font-size:0.86rem;
      font-weight:600;transition:all 0.2s;
    }
    .btn-cancel:hover{background:rgba(128,128,128,0.12);color:var(--text);}
    .btn-confirm{
      padding:10px 18px;background:var(--red);border:none;border-radius:9px;color:#fff;
      font-weight:800;cursor:pointer;font-family:'Cairo';font-size:0.86rem;transition:all 0.2s;
    }
    .btn-confirm:hover{background:var(--red-h);transform:translateY(-1px);}
    .btn-confirm:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .btn-danger{background:#ef4444;}
    .btn-danger:hover{background:#dc2626;}

    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
      padding:12px 22px;border-radius:14px;font-size:0.88rem;font-weight:600;z-index:999;
      border:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      opacity:0;visibility:hidden;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
      white-space:nowrap;max-width:90vw;text-align:center;
    }
    .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
    .toast-success{background:var(--modal-bg);color:var(--text);border-color:var(--border);}
    .toast-error{background:var(--red);color:#fff;border-color:var(--red);}
    .sidebar-overlay{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:15;
    }
    .sidebar-overlay.show{display:block;}

    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

    @media(max-width:680px){
      .topbar{height:52px;padding:0 12px;gap:6px;}
      .back-btn{padding:5px 10px;font-size:0.76rem;}
      .back-btn span{display:none;}
      .topbar-peer-av{width:30px;height:30px;}
      .topbar-peer-name{font-size:0.84rem;}
      .sidebar{
        position:fixed;top:0;right:0;bottom:0;z-index:16;width:260px;
        transform:translateX(100%);border-left:none;border-right:1px solid var(--border);
      }
      .sidebar.open{transform:translateX(0);}
      .sidebar-toggle{display:flex;}
      .bubble-wrap{max-width:82%;}
      .bubble{padding:9px 12px;font-size:0.88rem;border-radius:16px;}
      .msg-av{width:24px;height:24px;font-size:0.68rem;}
      .input-area{padding:8px 12px;}
      .btn-attach{width:36px;height:36px;}
      .send-btn{width:38px;height:38px;}
      .modal-box{padding:22px 18px;border-radius:18px;}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}
    }
  </style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="topbar-left">
    <a href="/chat" class="back-btn" id="backBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="backText">الرسائل</span>
    </a>
    <div class="topbar-peer" id="topbarPeer" onclick="openGroupSettings()">
      <div class="topbar-peer-av" id="groupAvWrap">G</div>
      <div style="min-width:0;">
        <div class="topbar-peer-name" id="groupNameEl">...</div>
        <div class="topbar-peer-role" id="groupMetaEl"></div>
      </div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="تبديل الثيم">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>

function fmtTime(s){ if(!s) return ''; return new Date(s).toLocaleTimeString(currentLang==='ar'?'ar':'en',{hour:'2-digit',minute:'2-digit'}); }
function fmtDay(s){
  if(!s) return '';
  const d = new Date(s), now = new Date();
  const diff = Math.floor((now-d)/86400000);
  if (diff === 0) return t('today');
  if (diff === 1) return t('yesterday');
  return d.toLocaleDateString(currentLang==='ar'?'ar-SA':'en-US',{month:'short',day:'numeric'});
}

async function apiFetch(url, method='GET', body=null){
  const token = getToken();
  const opts = { method, headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+token } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok){
    const text = await r.text().catch(()=> '');
    let msg = text;
    try { msg = JSON.parse(text).error || text; } catch(e){}
    const err = new Error(msg || ('HTTP '+r.status));
    err.status = r.status;
    throw err;
  }
  return r.json();
}

function showToast(msg, type='success'){
  let el = document.querySelector('.toast');
  if (el) el.remove();
  el = document.createElement('div');
  el.className = 'toast toast-'+type;
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('show'));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),300); }, 3000);
}

async function init(){
  if (currentTheme === 'dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeToggle').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  }
  applyLang();

  if (!GROUP_ID){ showError(t('groupNotFound')); return; }

  const token = getToken();
  if (!token){ showNotLogged(); return; }
  try {
    const r = await fetch('/api/auth/me', { headers:{ 'Authorization':'Bearer '+token } });
    if (!r.ok){ showNotLogged(); return; }
    const u = await r.json();
    if (!u || u.error){ showNotLogged(); return; }
    ME = u;
  } catch(e){ showNotLogged(); return; }

  try {
    const [g, users] = await Promise.all([
      apiFetch('/api/groups/' + GROUP_ID),
      apiFetch('/api/users').catch(()=>[])
    ]);
    group = g;
    members = Array.isArray(g.members) ? g.members : [];
    allUsers = Array.isArray(users) ? users : [];
    const me = members.find(m => m.user_id == ME.id);
    myRole = me?.role || 'member';
  } catch(e){
    if (e.status === 403){ showError(t('notMember')); }
    else { showError(t('groupNotFound')); }
    return;
  }

  renderTopbar();
  renderMembers();
  document.getElementById('addMemberBtn').style.display = (myRole !== 'member') ? 'flex' : 'none';
  document.getElementById('deleteGroupBtn').style.display = (myRole === 'admin') ? 'inline-flex' : 'none';

  buildChatUI();
  await loadMsgs(true);
  pollTimer = setInterval(() => loadMsgs(false), 4000);
}

function renderTopbar(){
  const av = group.avatar ? `<img src="${esc(group.avatar)}" alt="">` : (group.name||'?').charAt(0).toUpperCase();
  document.getElementById('groupAvWrap').innerHTML = av;
  document.getElementById('groupNameEl').textContent = group.name || '';
  document.getElementById('groupMetaEl').textContent = (members.length) + ' ' + t('members').toLowerCase();
}

function renderMembers(){
  const list = document.getElementById('memberList');
  if (!list || !members.length){ if(list) list.innerHTML = ''; return; }
  list.innerHTML = members.map(m => {
    const av = m.avatar ? `<img src="${esc(m.avatar)}" alt="">` : (m.display_name||m.username||'?').charAt(0).toUpperCase();
    const isMe = m.user_id == ME?.id;
    const roleLabel = m.role === 'admin' ? t('admin') : t('member');
    const canManage = (myRole !== 'member') && !isMe && !(m.role === 'admin' && myRole !== 'admin');
    let menu = '';
    if (canManage){
      const roleBtn = myRole === 'admin'
        ? (m.role === 'admin'
            ? `<button onclick="changeRole(${m.user_id},'member')">${t('demote')}</button>`
            : `<button onclick="changeRole(${m.user_id},'admin')">${t('promote')}</button>`)
        : '';
      menu = `<div class="m-actions">
        <div class="m-more" onclick="toggleMemberMenu(event, ${m.user_id})">⋮</div>
        <div class="m-menu" id="mmenu-${m.user_id}">
          ${roleBtn}
          <button class="danger" onclick="removeMember(${m.user_id})">${t('remove')}</button>
        </div>
      </div>`;
    }
    return `<div class="member-item">
      <div class="m-av" onclick="location.href='/profile?u='+encodeURIComponent('${esc(m.username)}')">${av}</div>
      <div class="m-info" onclick="location.href='/profile?u='+encodeURIComponent('${esc(m.username)}')">
        <div class="m-name">${esc(m.nickname || m.display_name || m.username)}${isMe ? ' ('+t('you')+')' : ''}</div>
        <div class="m-role ${m.role==='admin'?'admin':''}">${roleLabel}</div>
      </div>
      ${menu}
    </div>`;
  }).join('');
}

function toggleMemberMenu(e, uid){
  e.stopPropagation();
  const menu = document.getElementById('mmenu-'+uid);
  document.querySelectorAll('.m-menu.show').forEach(m => { if (m !== menu) m.classList.remove('show'); });
  menu.classList.toggle('show');
}

async function changeRole(uid, role){
  try {
    await apiFetch(`/api/groups/${GROUP_ID}/members/${uid}/role`, 'PUT', { role });
    const g = await apiFetch('/api/groups/' + GROUP_ID);
    members = g.members || [];
    renderMembers();
    showToast(t('settingsSaved'));
  } catch(e){ showToast(e.message || t('error'), 'error'); }
}

async function removeMember(uid){
  try {
    await apiFetch(`/api/groups/${GROUP_ID}/members/${uid}`, 'DELETE');
    members = members.filter(m => m.user_id != uid);
    renderMembers();
    renderTopbar();
    showToast(t('settingsSaved'));
  } catch(e){ showToast(e.message || t('error'), 'error'); }
}

// ============================================================
//  إعدادات المجموعة
// ============================================================
function openGroupSettings(){
  document.getElementById('gsName').value = group.name || '';
  document.getElementById('gsDesc').value = group.description || '';
  document.getElementById('gsName').disabled = myRole === 'member';
  document.getElementById('gsDesc').disabled = myRole === 'member';
  document.getElementById('gsSaveBtn').style.display = myRole === 'member' ? 'none' : 'inline-flex';
  openModal('groupSettingsModal');
}

async function saveGroupSettings(){
  const name = document.getElementById('gsName').value.trim();
  if (!name){ showToast(t('error'), 'error'); return; }
  const description = document.getElementById('gsDesc').value.trim();
  const btn = document.getElementById('gsSaveBtn');
  btn.disabled = true;
  try {
    await apiFetch('/api/groups/' + GROUP_ID, 'PUT', {
      name, description, avatar: group.avatar || '', theme: group.theme || 'default', background: group.background || 'default'
    });
    group.name = name; group.description = description;
    renderTopbar();
    closeModal('groupSettingsModal');
    showToast(t('settingsSaved'));
  } catch(e){ showToast(e.message || t('error'), 'error'); }
  btn.disabled = false;
}

async function leaveGroup(){
  if (!confirm(t('confirmLeave'))) return;
  try {
    await apiFetch(`/api/groups/${GROUP_ID}/members/${ME.id}`, 'DELETE');
    showToast(t('leftGroup'));
    setTimeout(()=> location.href = '/chat', 700);
  } catch(e){ showToast(e.message || t('error'), 'error'); }
}

async function deleteGroupConfirm(){
  if (!confirm(t('confirmDelete'))) return;
  try {
    await apiFetch('/api/groups/' + GROUP_ID, 'DELETE');
    showToast(t('groupDeleted'));
    setTimeout(()=> location.href = '/chat', 700);
  } catch(e){ showToast(e.message || t('error'), 'error'); }
}

// ============================================================
//  إضافة أعضاء
// ============================================================
function openAddMember(){
  const memberIds = new Set(members.map(m => m.user_id));
  const others = allUsers.filter(u => !memberIds.has(u.id));
  const box = document.getElementById('addMemberOptions');
  if (!others.length){
    box.innerHTML = `<div style="text-align:center;color:var(--muted);padding:16px;font-size:0.85rem;">${t('noOthers')}</div>`;
  } else {
    box.innerHTML = others.map(u => `
      <label class="member-check">
        <input type="checkbox" value="${u.id}">
        <div class="m-av" style="width:28px;height:28px;font-size:0.78rem;">
          ${u.avatar ? `<img src="${esc(u.avatar)}" alt="">` : ((u.display_name||u.username||'?').charAt(0).toUpperCase())}
        </div>
        <span>${esc(u.display_name || u.username)}</span>
      </label>`).join('');
  }
  openModal('addMemberModal');
}

async function confirmAddMembers(){
  const ids = [...document.querySelectorAll('#addMemberOptions input:checked')].map(i => Number(i.value));
  if (!ids.length){ closeModal('addMemberModal'); return; }
  const btn = document.getElementById('amConfirmBtn');
  btn.disabled = true;
  try {
    for (const uid of ids){
      await apiFetch(`/api/groups/${GROUP_ID}/members`, 'POST', { user_id: uid, role: 'member' });
    }
    const g = await apiFetch('/api/groups/' + GROUP_ID);
    members = g.members || [];
    renderMembers();
    renderTopbar();
    closeModal('addMemberModal');
    showToast(t('membersAdded'));
  } catch(e){ showToast(e.message || t('error'), 'error'); }
  btn.disabled = false;
}

// ============================================================
//  واجهة الدردشة
// ============================================================
function buildChatUI(){
  document.getElementById('chatMain').innerHTML = `
    <div class="msgs-area" id="msgsArea">
      <div style="text-align:center;color:var(--muted);padding:30px;font-size:0.85rem;font-weight:600;">${t('loading')}</div>
    </div>
    <div class="img-preview-bar" id="imgPreviewBar" style="display:none;">
      <img id="imgPreviewThumb" src="" alt="">
      <button class="img-rm-btn" onclick="removeChatImg()">${SVG.close}</button>
      <span style="font-size:0.76rem;color:var(--muted);">${t('imageAttached')}</span>
    </div>
    <div class="input-area">
      <button class="btn-attach" onclick="document.getElementById('chatImgFile').click()" title="${t('attach')}">${SVG.attach}</button>
      <input type="file" id="chatImgFile" accept=".jpg,.jpeg,image/jpeg" style="display:none;" onchange="onChatImg(event)">
      <textarea class="msg-input" id="msgInput" placeholder="${t('sendPlaceholder')}" rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">${SVG.send}</button>
    </div>`;
}

let _lastMsgs = [];
async function loadMsgs(scroll){
  const area = document.getElementById('msgsArea');
  try {
    const msgs = await apiFetch(`/api/groups/${GROUP_ID}/messages`);
    if (!Array.isArray(msgs)){ return; }
    _lastMsgs = msgs;
    await loadMsgReactions(msgs);
    renderMsgs(msgs, scroll);
  } catch(e){
    console.error('loadMsgs failed:', e);
    if (area) area.innerHTML = `<div style="text-align:center;color:var(--muted);padding:30px;font-size:0.85rem;font-weight:600;">⚠️ ${e.message || t('error')}</div>`;
  }
}

async function loadMsgReactions(msgs){
  if (!msgs || !msgs.length) return;
  try {
    const ids = msgs.map(m => m.id).join(',');
    const data = await apiFetch(`/api/groups/${GROUP_ID}/messages/reactions?ids=` + ids);
    if (data && typeof data === 'object') Object.assign(msgReactions, data);
  } catch(e) {
    // نتجاهل: سيتم عرض الريأكشنز الجديدة عند التفاعل مباشرة
  }
}

function renderMsgs(msgs, scroll = true){
  const area = document.getElementById('msgsArea');
  if (!area) return;
  if (!msgs || !msgs.length){
    area.innerHTML = `<div style="text-align:center;color:var(--muted);padding:30px;font-size:0.85rem;font-weight:600;">${t('noMessages')}</div>`;
    return;
  }
  let html = '', lastDay = '';
  msgs.forEach((m, i) => {
    const isMine = m.user_id == ME?.id;
    const day = fmtDay(m.created_at);
    if (day !== lastDay){
      html += `<div class="date-divider"><span>${day}</span></div>`;
      lastDay = day;
    }
    const next = msgs[i+1];
    const isLast = !next || next.user_id != m.user_id;
    const av = m.from_avatar ? `<img src="${esc(m.from_avatar)}" alt="">` : (m.from_name||'?').charAt(0).toUpperCase();
    const rc = msgReactions[m.id] || { reactions: [], userReaction: null };
    const totalReacts = rc.reactions && rc.reactions.length ? rc.reactions.reduce((s,r)=> s+Number(r.count||0), 0) : 0;
    const reactionHtml = totalReacts > 0 ?
      `<div class="msg-reaction" onclick="togglePicker(${m.id})">${rc.reactions.map(r => (REACTIONS.find(x=>x.emoji===r.emoji)||{}).icon || '').join('')} <span style="font-size:0.7rem;color:var(--muted);">${totalReacts}</span></div>` : '';
    html += `<div class="msg-row ${isMine ? 'mine' : 'theirs'}">
      ${!isMine ? `<div class="msg-av ${isLast?'':'invisible'}">${av}</div>` : ''}
      <div class="bubble-wrap">
        ${!isMine && isLast ? `<div class="sender-name">${esc(m.from_name)}</div>` : ''}
        <div class="bubble" id="bubble-${m.id}" onclick="togglePicker(${m.id})">
          ${m.image ? `<img class="bubble-img" src="${esc(m.image)}" loading="lazy" onerror="this.style.display='none'">` : ''}
          ${m.content ? esc(m.content) : ''}
          <div class="react-picker" id="picker-${m.id}">
            ${REACTIONS.map(r => `<button class="r-emoji ${rc.userReaction===r.emoji?'active':''}" onclick="reactMsg(event,${m.id},'${r.emoji}')">${r.icon}</button>`).join('')}
          </div>
        </div>
        ${reactionHtml}
        ${isLast ? `<div class="msg-time">${fmtTime(m.created_at)}</div>` : ''}
      </div>
      ${isMine ? `<div class="msg-av ${isLast?'':'invisible'}">${av}</div>` : ''}
    </div>`;
  });
  area.innerHTML = html;
  if (scroll) area.scrollTop = area.scrollHeight;
}

function togglePicker(id){
  const p = document.getElementById('picker-'+id);
  if (!p) return;
  document.querySelectorAll('.react-picker.show').forEach(x => { if (x !== p) x.classList.remove('show'); });
  p.classList.toggle('show');
}

async function reactMsg(e, mid, emoji){
  e.stopPropagation();
  document.querySelectorAll('.react-picker.show').forEach(p => p.classList.remove('show'));
  try {
    const d = await apiFetch(`/api/groups/${GROUP_ID}/messages/${mid}/react`, 'POST', { emoji });
    if (d.success){
      msgReactions[mid] = { reactions: d.reactions||[], userReaction: d.userReaction||null };
      renderMsgs(_lastMsgs, false);
    }
  } catch(e){
    console.error('reactMsg failed:', e);
    showToast(t('error'), 'error');
  }
}

function onChatImg(e){
  const f = e.target.files[0];
  if (!f) return;
  if (!f.type.match('image/jpeg')){ showToast('JPG/JPEG فقط', 'error'); return; }
  const r = new FileReader();
  r.onload = ev => {
    chatImgBase64 = ev.target.result;
    document.getElementById('imgPreviewThumb').src = chatImgBase64;
    document.getElementById('imgPreviewBar').style.display = 'flex';
  };
  r.readAsDataURL(f);
  e.target.value = '';
}
function removeChatImg(){
  chatImgBase64 = '';
  document.getElementById('imgPreviewBar').style.display = 'none';
}

async function sendMsg(){
  const input = document.getElementById('msgInput');
  const content = input?.value.trim() || '';
  if (!content && !chatImgBase64) return;
  input.value = '';
  input.style.height = '';
  document.getElementById('sendBtn').disabled = true;
  try {
    let imageUrl = '';
    if (chatImgBase64){
      const up = await apiFetch('/api/upload', 'POST', { image: chatImgBase64 });
      if (up.url) imageUrl = up.url;
      removeChatImg();
    }
    await apiFetch(`/api/groups/${GROUP_ID}/messages`, 'POST', { content, image: imageUrl });
    await loadMsgs(true);
  } catch(e){
    console.error('sendMsg failed:', e);
    showToast(t('error'), 'error');
  }
  document.getElementById('sendBtn').disabled = false;
}

function onKey(e){ if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); } }
function autoResize(el){ el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

init();
</script>
</body>
</html>
