<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="hostaka-icon.png" type="image/png">
<title>Hostaka — صفحة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f7f8; --card:#ffffff; --border:#e5e5e5; --text:#1a1a1a; --muted:#6b7280;
    --primary:#000000; --primary-h:#333333; --shadow:0 8px 24px rgba(0,0,0,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  a{color:inherit;text-decoration:none;}

  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(255,255,255,0.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
  .back-btn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.05);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);}
  .topbar-title{font-weight:800;}

  .cover{height:150px;background:linear-gradient(135deg,#1a1a1a,#3a3a3a);position:relative;}
  .cover img{width:100%;height:100%;object-fit:cover;}
  .page-head{max-width:700px;margin:0 auto;padding:0 20px;position:relative;}
  .page-avatar{width:92px;height:92px;border-radius:22px;background:linear-gradient(145deg,#000,#333);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:2rem;border:4px solid var(--card);margin-top:-46px;overflow:hidden;box-shadow:var(--shadow);}
  .page-avatar img{width:100%;height:100%;object-fit:cover;}
  .page-info{padding:14px 0 18px;}
  .page-name{font-size:1.4rem;font-weight:900;display:flex;align-items:center;gap:8px;}
  .page-handle{color:var(--muted);font-size:0.85rem;margin-top:2px;}
  .page-bio{margin-top:10px;font-size:0.9rem;line-height:1.7;color:var(--text);}
  .page-stats{display:flex;gap:18px;margin-top:12px;font-size:0.85rem;color:var(--muted);}
  .page-stats b{color:var(--text);}
  .page-actions{display:flex;gap:10px;margin-top:14px;}
  .btn{padding:10px 22px;border-radius:12px;border:none;font-weight:700;font-size:0.85rem;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary.following{background:var(--card);color:var(--text);border:1.5px solid var(--border);}
  .btn-ghost{background:rgba(0,0,0,0.05);color:var(--text);}

  .posts-wrap{max-width:700px;margin:10px auto 60px;padding:0 20px;display:flex;flex-direction:column;gap:16px;}
  .post-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;}
  .post-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .post-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(145deg,#000,#333);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;overflow:hidden;flex:0 0 auto;}
  .post-av img{width:100%;height:100%;object-fit:cover;}
  .post-name{font-weight:800;font-size:0.9rem;}
  .post-date{font-size:0.72rem;color:var(--muted);}
  .post-content{font-size:0.92rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
  .post-media{margin-top:10px;border-radius:12px;overflow:hidden;max-height:420px;}
  .post-media img,.post-media video{width:100%;max-height:420px;object-fit:cover;display:block;}

  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:0.9rem;}
  .loader-wrap{display:flex;justify-content:center;padding:60px;}
  .spinner{width:30px;height:30px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--primary);animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* نافذة إدارة الصفحة (تعديل) */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:60;display:none;align-items:flex-end;justify-content:center;}
  .modal-bg.show{display:flex;}
  .modal-box{background:var(--card);width:100%;max-width:460px;border-radius:20px 20px 0 0;padding:22px 20px calc(20px + env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto;}
  @media(min-width:600px){.modal-bg{align-items:center;}.modal-box{border-radius:20px;}}
  .modal-title{font-weight:800;font-size:1.05rem;margin-bottom:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:6px;font-weight:700;}
  .field input,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:0.88rem;background:var(--bg);}
  .field textarea{min-height:80px;resize:vertical;}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
  .err{color:#dc2626;font-size:0.8rem;margin-bottom:8px;display:none;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="location.href='/'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="topbar-title">صفحة</span>
</div>

<div id="content">
  <div class="loader-wrap"><div class="spinner"></div></div>
</div>

<div class="modal-bg" id="editPageModal">
  <div class="modal-box">
    <div class="modal-title">تعديل الصفحة</div>
    <div class="err" id="editPageErr"></div>
    <div class="field"><label>اسم الصفحة</label><input type="text" id="epName" maxlength="60"></div>
    <div class="field"><label>الفئة</label><input type="text" id="epCategory" maxlength="40" placeholder="ألعاب، تقنية، فن...‎"></div>
    <div class="field"><label>نبذة</label><textarea id="epBio" maxlength="300"></textarea></div>
    <input type="file" id="epAvatarFile" accept="image/*" style="display:none;" onchange="onEditAvatar(event)">
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEditPage()">إلغاء</button>
      <button class="btn btn-ghost" onclick="document.getElementById('epAvatarFile').click()">تغيير الصورة</button>
      <button class="btn btn-primary" id="epSaveBtn" onclick="savePageEdit()">حفظ</button>
    </div>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('hostaka_token') || '';
let ME = null;
try { const s = localStorage.getItem('hostaka_user'); if (s) ME = JSON.parse(s); } catch(e) {}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
async function apiFetch(url, method='GET', body=null){
  const opts = { method, headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}
function toUTCDate(s){
  if (!s) return new Date(NaN);
  if (typeof s === 'string' && !/[zZ]|[+-]\d\d:?\d\d$/.test(s)) return new Date(s.replace(' ', 'T') + 'Z');
  return new Date(s);
}
function fmtDate(s){
  const d = toUTCDate(s);
  return d.toLocaleDateString('ar', { day:'numeric', month:'short', year:'numeric' });
}

const username = new URLSearchParams(location.search).get('u') || '';
let pageData = null;

async function loadPage(){
  if (!username) { showEmpty('لم يتم تحديد الصفحة'); return; }
  try {
    const d = await apiFetch('/api/pages/' + encodeURIComponent(username));
    if (d.error) { showEmpty(d.error); return; }
    pageData = d;
    document.title = 'Hostaka — ' + d.name;
    render();
  } catch(e) { showEmpty('تعذر تحميل الصفحة'); }
}

function showEmpty(msg){
  document.getElementById('content').innerHTML = `<div class="empty">${esc(msg)}</div>`;
}

function render(){
  const p = pageData;
  const avatarHtml = p.avatar ? `<img src="${esc(p.avatar)}" alt="">` : esc((p.name||'?').charAt(0).toUpperCase());
  const followBtn = ME
    ? (p.isOwner
        ? `<button class="btn btn-ghost" onclick="openEditPage()">
             <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
             تعديل الصفحة
           </button>`
        : `<button class="btn ${p.isFollowing ? 'btn-primary following' : 'btn-primary'}" id="followBtn" onclick="toggleFollow()">${p.isFollowing ? 'متابَع' : 'متابعة'}</button>`)
    : `<button class="btn btn-primary" onclick="location.href='/login'">تسجيل الدخول للمتابعة</button>`;

  const postsHtml = (p.posts && p.posts.length)
    ? p.posts.map(postCardHtml).join('')
    : `<div class="empty">لا توجد منشورات بعد</div>`;

  document.getElementById('content').innerHTML = `
    <div class="cover">${p.cover ? `<img src="${esc(p.cover)}" alt="">` : ''}</div>
    <div class="page-head">
      <div class="page-avatar">${avatarHtml}</div>
      <div class="page-info">
        <div class="page-name">${esc(p.name)}${p.verified ? verifiedBadge() : ''}</div>
        <div class="page-handle">@${esc(p.username)}${p.category ? ' · ' + esc(p.category) : ''}</div>
        ${p.bio ? `<div class="page-bio">${esc(p.bio)}</div>` : ''}
        <div class="page-stats"><span><b id="followerCount">${p.followerCount || 0}</b> متابع</span><span><b>${(p.posts||[]).length}</b> منشور</span></div>
        <div class="page-actions">${followBtn}</div>
      </div>
    </div>
    <div class="posts-wrap">${postsHtml}</div>
  `;
}

function verifiedBadge(){
  return `<svg width="16" height="16" viewBox="0 0 24 24" fill="#000"><path d="M12 2l2.4 2.2 3.2-.6.6 3.2L20.4 9l-1.8 2.8L20.4 15l-2.2 2.2-.6 3.2-3.2-.6L12 22l-2.4-2.2-3.2.6-.6-3.2L3.6 15l1.8-2.8L3.6 9l2.2-2.2.6-3.2 3.2.6z"/><path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function postCardHtml(post){
  const avatarHtml = pageData.avatar ? `<img src="${esc(pageData.avatar)}" alt="">` : esc((pageData.name||'?').charAt(0).toUpperCase());
  let mediaHtml = '';
  if (post.video) mediaHtml = `<div class="post-media"><video controls src="${esc(post.video)}"></video></div>`;
  else if (post.image) mediaHtml = `<div class="post-media"><img src="${esc(post.image)}" loading="lazy"></div>`;
  return `<div class="post-card">
    <div class="post-head">
      <div class="post-av">${avatarHtml}</div>
      <div>
        <div class="post-name">${esc(pageData.name)}</div>
        <div class="post-date">${fmtDate(post.created_at)}${Number(post.edited)===1 ? ' · معدّلة' : ''}</div>
      </div>
    </div>
    ${post.content ? `<div class="post-content">${esc(post.content)}</div>` : ''}
    ${mediaHtml}
  </div>`;
}

async function toggleFollow(){
  if (!ME) { location.href = '/login'; return; }
  const btn = document.getElementById('followBtn');
  btn.disabled = true;
  try {
    const action = pageData.isFollowing ? 'unfollow' : 'follow';
    const d = await apiFetch('/api/pages/' + pageData.id + '/' + action, 'POST');
    if (d.success) {
      pageData.isFollowing = !pageData.isFollowing;
      pageData.followerCount = d.followerCount;
      render();
    }
  } catch(e) {}
  if (btn) btn.disabled = false;
}

let editAvatarBase64 = '';
function openEditPage(){
  document.getElementById('epName').value = pageData.name || '';
  document.getElementById('epCategory').value = pageData.category || '';
  document.getElementById('epBio').value = pageData.bio || '';
  document.getElementById('editPageErr').style.display = 'none';
  editAvatarBase64 = '';
  document.getElementById('editPageModal').classList.add('show');
}
function closeEditPage(){ document.getElementById('editPageModal').classList.remove('show'); }
function onEditAvatar(e){
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => { editAvatarBase64 = ev.target.result; };
  reader.readAsDataURL(f);
}
async function savePageEdit(){
  const errEl = document.getElementById('editPageErr'); errEl.style.display = 'none';
  const name = document.getElementById('epName').value.trim();
  if (!name) { errEl.textContent = 'اسم الصفحة مطلوب'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('epSaveBtn'); btn.disabled = true;
  try {
    let avatarUrl = pageData.avatar;
    if (editAvatarBase64) {
      const up = await apiFetch('/api/upload', 'POST', { image: editAvatarBase64 });
      if (up.url) avatarUrl = up.url;
    }
    const d = await apiFetch('/api/pages/' + pageData.id, 'PUT', {
      name, avatar: avatarUrl, bio: document.getElementById('epBio').value.trim(),
      category: document.getElementById('epCategory').value.trim()
    });
    if (d.success) { closeEditPage(); await loadPage(); }
    else { errEl.textContent = d.error || 'فشل الحفظ'; errEl.style.display = 'block'; }
  } catch(e) { errEl.textContent = 'تعذر الاتصال'; errEl.style.display = 'block'; }
  btn.disabled = false;
}

loadPage();
</script>
</body>
</html>
