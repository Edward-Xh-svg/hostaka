<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="hostaka-icon.png" type="image/png">
  <title>Hostaka — Shizi AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #ffffff;
      --dark: #f7f7f8;
      --card: #ffffff;
      --border: #e5e5e5;
      --text: #1a1a1a;
      --muted: #6b7280;
      --pink: #ec4899;
      --pink-h: #db2777;
      --accent: #ec4899;
      --mine-bg: rgba(0,0,0,0.06);
      --mine-border: rgba(0,0,0,0.1);
      --shizi-bg: rgba(236,72,153,0.08);
      --shizi-border: rgba(236,72,153,0.18);
      --topbar-bg: rgba(255,255,255,0.85);
      --input-bg: #f7f7f8;
      --modal-bg: #ffffff;
      --shadow: 0 10px 30px rgba(0,0,0,0.4);
      --shizi-gradient: linear-gradient(145deg, #ec4899, #a855f7);
    }
    [data-theme="dark"] {
      --black: #0d0d0d;
      --dark: #141414;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --muted: #8d8d8d;
      --pink: #f472b6;
      --pink-h: #f9a8d4;
      --accent: #f472b6;
      --mine-bg: rgba(255,255,255,0.06);
      --mine-border: rgba(255,255,255,0.1);
      --shizi-bg: rgba(244,114,182,0.1);
      --shizi-border: rgba(244,114,182,0.22);
      --topbar-bg: rgba(13,13,13,0.85);
      --input-bg: #222222;
      --modal-bg: #1a1a1a;
      --shadow: 0 10px 30px rgba(0,0,0,0.7);
      --shizi-gradient: linear-gradient(145deg, #f472b6, #a855f7);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{
      background:radial-gradient(circle at 18% 16%,rgba(236,72,153,0.06),transparent 22%),var(--black);
      color:var(--text);
      font-family:'Cairo',sans-serif;
      display:flex;flex-direction:column;
      -webkit-font-smoothing:antialiased;
      transition:background 0.3s, color 0.3s;
    }
    .topbar{
      height:56px;background:var(--topbar-bg);
      backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 16px;gap:10px;
      flex-shrink:0;z-index:20;transition:background 0.3s, border-color 0.3s;
    }
    .topbar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
    .topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .back-btn{
      display:flex;align-items:center;gap:6px;
      color:var(--muted);font-size:0.82rem;cursor:pointer;
      padding:6px 12px;border-radius:999px;
      background:rgba(128,128,128,0.06);border:1px solid var(--border);
      font-family:'Cairo';font-weight:600;text-decoration:none;white-space:nowrap;
      transition:all 0.18s;
    }
    .back-btn:hover{color:var(--text);background:rgba(128,128,128,0.12);}
    .back-btn:active{transform:scale(0.95);}
    .back-btn svg{width:14px;height:14px;}
    .shizi-brand{display:flex;align-items:center;gap:9px;min-width:0;}
    .shizi-av{
      width:34px;height:34px;border-radius:50%;
      background:var(--shizi-gradient);
      display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:1rem;color:#fff;flex-shrink:0;
      box-shadow:0 4px 14px rgba(236,72,153,0.35);
    }
    .shizi-name{font-weight:800;font-size:0.92rem;color:var(--text);white-space:nowrap;}
    .shizi-status{font-size:0.68rem;color:var(--pink);font-weight:700;display:flex;align-items:center;gap:4px;}
    .shizi-status .dot{width:6px;height:6px;border-radius:50%;background:var(--pink);animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
    .icon-btn{
      width:36px;height:36px;border-radius:50%;
      background:rgba(128,128,128,0.06);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:var(--muted);transition:all 0.2s;flex-shrink:0;
    }
    .icon-btn:hover,.icon-btn:active{background:rgba(128,128,128,0.12);color:var(--text);}
    .icon-btn svg{width:16px;height:16px;}
    .lang-selector{position:relative;}
    .lang-menu{
      position:absolute;top:42px;left:0;
      background:var(--modal-bg);border:1px solid var(--border);border-radius:12px;
      padding:6px 0;min-width:140px;
      opacity:0;visibility:hidden;transform:translateY(-6px) scale(0.96);
      transition:all 0.2s cubic-bezier(0.16,1,0.3,1);z-index:30;box-shadow:var(--shadow);
    }
    .lang-menu.show{opacity:1;visibility:visible;transform:translateY(0) scale(1);}
    .lang-menu button{
      display:flex;align-items:center;gap:8px;width:100%;padding:8px 16px;
      background:none;border:none;color:var(--text);
      font-family:'Cairo',sans-serif;font-size:0.85rem;cursor:pointer;
      transition:background 0.15s;text-align:right;
    }
    .lang-menu button:hover{background:rgba(128,128,128,0.08);}
    .lang-menu button .flag{font-size:1.1rem;}

    .chat-main{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;}
    .msgs-area{
      flex:1;overflow-y:auto;padding:18px 14px;
      display:flex;flex-direction:column;gap:4px;min-height:0;
    }
    .msgs-area::-webkit-scrollbar{width:4px;}
    .msgs-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

    .welcome{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:14px;color:var(--muted);text-align:center;padding:20px;animation:fadeIn 0.5s ease;
    }
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .welcome .shizi-big{
      width:76px;height:76px;border-radius:50%;
      background:var(--shizi-gradient);
      display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:2rem;color:#fff;
      box-shadow:0 10px 30px rgba(236,72,153,0.35);
    }
    .welcome h2{font-size:1.15rem;color:var(--text);font-weight:800;}
    .welcome p{font-size:0.85rem;max-width:320px;line-height:1.7;}
    .suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:420px;margin-top:6px;}
    .suggestion-chip{
      padding:8px 14px;border-radius:999px;
      background:var(--shizi-bg);border:1px solid var(--shizi-border);
      color:var(--pink);font-size:0.78rem;font-weight:700;cursor:pointer;
      font-family:'Cairo';transition:all 0.18s;
    }
    .suggestion-chip:hover{background:var(--shizi-border);transform:translateY(-1px);}

    .msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:8px;animation:msgIn 0.25s cubic-bezier(0.16,1,0.3,1);}
    @keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .msg-row.mine{flex-direction:row-reverse;}
    .msg-av{
      width:28px;height:28px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-weight:700;font-size:0.75rem;color:#fff;flex-shrink:0;overflow:hidden;
    }
    .msg-av.shizi{background:var(--shizi-gradient);}
    .msg-av.user{background:linear-gradient(145deg,#333,#111);}
    .bubble-wrap{display:flex;flex-direction:column;max-width:74%;min-width:0;}
    .msg-row.mine .bubble-wrap{align-items:flex-end;}
    .bubble{
      padding:11px 15px;border-radius:18px;font-size:0.9rem;line-height:1.7;
      word-break:break-word;white-space:pre-wrap;
    }
    .msg-row.mine .bubble{background:var(--mine-bg);border:1px solid var(--mine-border);border-bottom-left-radius:5px;}
    .msg-row.theirs .bubble{background:var(--shizi-bg);border:1px solid var(--shizi-border);border-bottom-right-radius:5px;}
    .msg-time{font-size:0.62rem;color:var(--muted);padding:3px 5px;font-weight:600;}

    .typing-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:8px;}
    .typing-bubble{
      background:var(--shizi-bg);border:1px solid var(--shizi-border);
      border-radius:18px;border-bottom-right-radius:5px;
      padding:13px 16px;display:flex;gap:4px;align-items:center;
    }
    .typing-dot{width:6px;height:6px;border-radius:50%;background:var(--pink);animation:typingBounce 1.2s infinite ease-in-out;}
    .typing-dot:nth-child(2){animation-delay:0.15s;}
    .typing-dot:nth-child(3){animation-delay:0.3s;}
    @keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:0.5;}30%{transform:translateY(-5px);opacity:1;}}

    .input-area{
      padding:12px 14px;border-top:1px solid var(--border);
      display:flex;align-items:flex-end;gap:8px;
      background:var(--topbar-bg);flex-shrink:0;
    }
    .msg-input{
      flex:1;padding:12px 16px;background:var(--input-bg);
      border:1px solid var(--border);border-radius:20px;
      color:var(--text);font-family:'Cairo';font-size:0.9rem;
      resize:none;max-height:120px;line-height:1.5;
      transition:all 0.2s;
    }
    .msg-input:focus{outline:none;box-shadow:0 0 0 3px rgba(236,72,153,0.12);}
    .msg-input::placeholder{color:var(--muted);}
    .send-btn{
      width:42px;height:42px;border-radius:50%;flex-shrink:0;
      background:var(--shizi-gradient);border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all 0.2s;box-shadow:0 4px 14px rgba(236,72,153,0.3);
    }
    .send-btn:hover{transform:translateY(-2px);}
    .send-btn:active{transform:translateY(0);}
    .send-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .send-btn svg{width:17px;height:17px;}

    .not-logged{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:14px;padding:80px 20px;text-align:center;
    }
    .not-logged svg{width:44px;height:44px;color:var(--muted);}
    .not-logged h2{font-size:1.1rem;color:var(--text);font-weight:800;}
    .not-logged p{color:var(--muted);font-size:0.85rem;max-width:280px;}
    .btn-go{
      margin-top:6px;display:inline-flex;align-items:center;gap:8px;
      background:var(--shizi-gradient);color:#fff;padding:10px 22px;
      border-radius:12px;text-decoration:none;font-weight:700;font-size:0.85rem;
    }

    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
      padding:12px 22px;border-radius:14px;font-size:0.88rem;font-weight:600;
      z-index:999;border:1px solid var(--border);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      opacity:0;visibility:hidden;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
      white-space:nowrap;max-width:90vw;text-align:center;
    }
    .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
    .toast-success{background:var(--modal-bg);color:var(--text);border-color:var(--border);}
    .toast-error{background:#ef4444;color:#fff;border-color:#ef4444;}

    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

    @media(max-width:680px){
      .topbar{height:52px;padding:0 12px;gap:6px;}
      .back-btn span{display:none;}
      .back-btn{padding:6px;}
      .shizi-av{width:30px;height:30px;font-size:0.9rem;}
      .shizi-name{font-size:0.86rem;}
      .bubble-wrap{max-width:86%;}
      .bubble{padding:10px 13px;font-size:0.88rem;}
      .input-area{padding:9px 10px;}
      .msg-input{padding:10px 14px;font-size:0.86rem;}
      .send-btn{width:38px;height:38px;}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}
    }
  </style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="topbar-left">
    <a href="/" class="back-btn" id="backBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="backText">Hostaka</span>
    </a>
    <div class="shizi-brand">
      <div class="shizi-av">S</div>
      <div>
        <div class="shizi-name">Shizi AI 🎀</div>
        <div class="shizi-status"><span class="dot"></span><span id="statusText">متصلة الآن</span></div>
      </div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="clearBtn" onclick="clearChat()" title="محادثة جديدة">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
    <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="تبديل الثيم">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
    <div class="lang-selector icon-btn" id="langToggle" onclick="toggleLangMenu()" title="تغيير اللغة">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <div class="lang-menu" id="langMenu">
        <button onclick="setLang('ar')"><span class="flag">🇸🇦</span> العربية</button>
        <button onclick="setLang('en')"><span class="flag">🇬🇧</span> English</button>
        <button onclick="setLang('fr')"><span class="flag">🇫🇷</span> Français</button>
        <button onclick="setLang('ru')"><span class="flag">🇷🇺</span> Русский</button>
        <button onclick="setLang('zh')"><span class="flag">🇨🇳</span> 中文</button>
        <button onclick="setLang('ja')"><span class="flag">🇯🇵</span> 日本語</button>
      </div>
    </div>
  </div>
</div>

<div class="chat-main" id="chatMain">
  <div class="msgs-area" id="msgsArea" style="display:none;"></div>
</div>

<div class="input-area" id="inputArea" style="display:none;">
  <textarea class="msg-input" id="msgInput" placeholder="اكتبي رسالتك لشيزي..." rows="1" onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMsg()">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<script>
const LANG = {
  ar: {
    back:'Hostaka', status:'متصلة الآن', placeholder:'اكتبي رسالتك لشيزي...',
    welcomeTitle:'أهلاً، أنا شيزي 🎀', welcomeText:'مساعدتك الذكية في منصة Hostaka. اسأليني أي شيء وبقدر أساعدك فيه!',
    s1:'ما هي منصة Hostaka؟', s2:'اقترح علي فكرة منشور', s3:'ساعدني في كتابة وصف بروفايل', s4:'أخبرني نكتة لطيفة',
    loginRequired:'يجب تسجيل الدخول', loginText:'سجّلي الدخول لبدء الدردشة مع شيزي', home:'الرئيسية',
    clearedMsg:'بدأنا محادثة جديدة ✨', errorMsg:'حدث خطأ، حاولي مرة أخرى', notConfigured:'لم يتم إعداد Shizi AI بعد'
  },
  en: {
    back:'Hostaka', status:'Online now', placeholder:'Type a message to Shizi...',
    welcomeTitle:"Hi, I'm Shizi 🎀", welcomeText:'Your smart assistant on Hostaka. Ask me anything!',
    s1:'What is Hostaka?', s2:'Suggest a post idea', s3:'Help me write a bio', s4:'Tell me a fun fact',
    loginRequired:'Login required', loginText:'Please login to chat with Shizi', home:'Home',
    clearedMsg:'Started a new chat ✨', errorMsg:'Something went wrong, try again', notConfigured:'Shizi AI is not configured yet'
  },
  fr: {
    back:'Hostaka', status:'En ligne', placeholder:'Écrivez à Shizi...',
    welcomeTitle:'Salut, je suis Shizi 🎀', welcomeText:'Votre assistante intelligente sur Hostaka. Demandez-moi tout !',
    s1:"Qu'est-ce que Hostaka ?", s2:'Suggère une idée de post', s3:'Aide-moi à écrire ma bio', s4:'Raconte-moi une anecdote',
    loginRequired:'Connexion requise', loginText:'Connectez-vous pour discuter avec Shizi', home:'Accueil',
    clearedMsg:'Nouvelle discussion ✨', errorMsg:'Une erreur est survenue', notConfigured:"Shizi AI n'est pas encore configurée"
  },
  ru: {
    back:'Hostaka', status:'В сети', placeholder:'Напишите Shizi...',
    welcomeTitle:'Привет, я Shizi 🎀', welcomeText:'Ваш умный помощник на Hostaka. Спросите меня о чём угодно!',
    s1:'Что такое Hostaka?', s2:'Предложи идею для поста', s3:'Помоги написать био', s4:'Расскажи интересный факт',
    loginRequired:'Требуется вход', loginText:'Войдите, чтобы общаться с Shizi', home:'Главная',
    clearedMsg:'Новый чат ✨', errorMsg:'Произошла ошибка', notConfigured:'Shizi AI ещё не настроена'
  },
  zh: {
    back:'Hostaka', status:'在线', placeholder:'给 Shizi 发消息...',
    welcomeTitle:'嗨，我是 Shizi 🎀', welcomeText:'Hostaka 平台的智能助手。问我任何问题！',
    s1:'Hostaka 是什么？', s2:'给我一个发帖灵感', s3:'帮我写个人简介', s4:'讲个有趣的事实',
    loginRequired:'需要登录', loginText:'请登录以与 Shizi 聊天', home:'首页',
    clearedMsg:'开始新对话 ✨', errorMsg:'出错了，请重试', notConfigured:'Shizi AI 尚未配置'
  },
  ja: {
    back:'Hostaka', status:'オンライン', placeholder:'Shiziにメッセージを送る...',
    welcomeTitle:'こんにちは、Shiziです 🎀', welcomeText:'Hostakaのスマートアシスタントです。何でも聞いてください！',
    s1:'Hostakaとは？', s2:'投稿アイデアを提案して', s3:'プロフィール文を手伝って', s4:'面白い豆知識を教えて',
    loginRequired:'ログインが必要です', loginText:'Shiziとチャットするにはログインしてください', home:'ホーム',
    clearedMsg:'新しいチャットを開始しました ✨', errorMsg:'エラーが発生しました', notConfigured:'Shizi AIはまだ設定されていません'
  }
};

let currentLang = localStorage.getItem('hostaka_lang') || 'ar';
let currentTheme = localStorage.getItem('hostaka_theme') || 'light';
let ME = null;
let messages = [];
let sending = false;

function t(key){ return LANG[currentLang]?.[key] || LANG['ar'][key] || key; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(s){ if(!s) return ''; return new Date(s).toLocaleTimeString(currentLang==='ar'?'ar':'en',{hour:'2-digit',minute:'2-digit'}); }
const getToken = () => localStorage.getItem('hostaka_token') || '';

function applyLang(){
  document.documentElement.lang = currentLang;
  document.documentElement.dir = (currentLang === 'ar') ? 'rtl' : 'ltr';
  document.getElementById('backText').textContent = t('back');
  document.getElementById('statusText').textContent = t('status');
  const input = document.getElementById('msgInput');
  if (input) input.placeholder = t('placeholder');
  if (!messages.length) renderWelcome();
}

function toggleTheme(){
  const html = document.documentElement;
  if (currentTheme === 'light'){
    html.setAttribute('data-theme','dark'); currentTheme='dark';
    document.getElementById('themeToggle').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  } else {
    html.removeAttribute('data-theme'); currentTheme='light';
    document.getElementById('themeToggle').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
  }
  localStorage.setItem('hostaka_theme', currentTheme);
}
function toggleLangMenu(){ document.getElementById('langMenu').classList.toggle('show'); }
document.addEventListener('click', e => {
  if (!document.getElementById('langToggle').contains(e.target)) document.getElementById('langMenu').classList.remove('show');
});
function setLang(lang){
  currentLang = lang;
  localStorage.setItem('hostaka_lang', lang);
  document.getElementById('langMenu').classList.remove('show');
  applyLang();
}

async function apiFetch(url, method='GET', body=null){
  const token = getToken();
  const opts = { method, headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+token } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok){
    const text = await r.text().catch(()=> '');
    let msg = text;
    try { msg = JSON.parse(text).error || text; } catch(e){}
    const err = new Error(msg || ('HTTP '+r.status));
    err.status = r.status;
    throw err;
  }
  return r.json();
}

function showToast(msg, type='success'){
  let el = document.querySelector('.toast');
  if (el) el.remove();
  el = document.createElement('div');
  el.className = 'toast toast-'+type;
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('show'));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),300); }, 3000);
}

function showNotLogged(){
  document.getElementById('chatMain').innerHTML = `
    <div class="not-logged">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <h2>${t('loginRequired')}</h2>
      <p>${t('loginText')}</p>
      <a href="/" class="btn-go">${t('home')}</a>
    </div>`;
  document.getElementById('inputArea').style.display = 'none';
}

function renderWelcome(){
  document.getElementById('chatMain').innerHTML = `
    <div class="welcome">
      <div class="shizi-big">S</div>
      <h2>${t('welcomeTitle')}</h2>
      <p>${t('welcomeText')}</p>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="quickSend('${esc(t('s1'))}')">${t('s1')}</div>
        <div class="suggestion-chip" onclick="quickSend('${esc(t('s2'))}')">${t('s2')}</div>
        <div class="suggestion-chip" onclick="quickSend('${esc(t('s3'))}')">${t('s3')}</div>
        <div class="suggestion-chip" onclick="quickSend('${esc(t('s4'))}')">${t('s4')}</div>
      </div>
    </div>`;
}

function quickSend(text){
  document.getElementById('msgInput').value = text;
  sendMsg();
}

function renderMsgs(){
  const area = document.getElementById('chatMain');
  if (!messages.length){ renderWelcome(); return; }
  let html = '<div class="msgs-area" id="msgsArea">';
  messages.forEach(m => {
    const isMine = m.role === 'user';
    html += `<div class="msg-row ${isMine ? 'mine' : 'theirs'}">
      <div class="msg-av ${isMine ? 'user' : 'shizi'}">${isMine ? (ME?.username||'?').charAt(0).toUpperCase() : 'S'}</div>
      <div class="bubble-wrap">
        <div class="bubble">${esc(m.content)}</div>
        ${m.created_at ? `<div class="msg-time">${fmtTime(m.created_at)}</div>` : ''}
      </div>
    </div>`;
  });
  if (sending){
    html += `<div class="typing-row">
      <div class="msg-av shizi">S</div>
      <div class="typing-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
    </div>`;
  }
  html += '</div>';
  area.innerHTML = html;
  const msgsArea = document.getElementById('msgsArea');
  if (msgsArea) msgsArea.scrollTop = msgsArea.scrollHeight;
}

async function loadHistory(){
  try {
    const data = await apiFetch('/api/shizi/history');
    messages = Array.isArray(data) ? data : [];
    renderMsgs();
  } catch(e){
    console.error('loadHistory failed:', e);
    messages = [];
    renderMsgs();
  }
}

function onKey(e){ if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); } }
function autoResize(el){ el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

async function sendMsg(){
  if (sending) return;
  const input = document.getElementById('msgInput');
  const content = input?.value.trim() || '';
  if (!content) return;
  input.value = '';
  input.style.height = '';
  document.getElementById('sendBtn').disabled = true;

  messages.push({ role:'user', content, created_at: new Date().toISOString() });
  sending = true;
  renderMsgs();

  try {
    const d = await apiFetch('/api/shizi/chat', 'POST', { message: content });
    sending = false;
    if (d.reply){
      messages.push({ role:'assistant', content: d.reply, created_at: new Date().toISOString() });
    }
    renderMsgs();
  } catch(e){
    sending = false;
    console.error('sendMsg failed:', e);
    renderMsgs();
    showToast(e.message && e.message.includes('DEEPSEEK') ? t('notConfigured') : t('errorMsg'), 'error');
  }
  document.getElementById('sendBtn').disabled = false;
}

async function clearChat(){
  try {
    await apiFetch('/api/shizi/history', 'DELETE');
    messages = [];
    renderMsgs();
    showToast(t('clearedMsg'));
  } catch(e){
    console.error('clearChat failed:', e);
    showToast(t('errorMsg'), 'error');
  }
}

async function init(){
  if (currentTheme === 'dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('themeToggle').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  }
  applyLang();

  const token = getToken();
  if (!token){ showNotLogged(); return; }
  try {
    const r = await fetch('/api/auth/me', { headers:{ 'Authorization':'Bearer '+token } });
    if (!r.ok){ showNotLogged(); return; }
    const u = await r.json();
    if (!u || u.error){ showNotLogged(); return; }
    ME = u;
  } catch(e){ showNotLogged(); return; }

  document.getElementById('inputArea').style.display = 'flex';
  await loadHistory();
}

init();
</script>
</body>
</html>
