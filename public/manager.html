<!DOCTYPE html>
<html class="page-manager" lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="hostaka-icon.png" type="image/png">
<title>Hostaka — إدارة الحساب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body class="page-manager">

<div class="topbar">
  <a href="/" class="back-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    إدارة الحساب
  </a>
  <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="تبديل الثيم">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</div>

<div class="wrap" id="wrap">
  <div style="text-align:center;padding:60px;color:var(--muted);">جارٍ التحميل...</div>
</div>

<!-- نافذة تأكيد الكود المرسل للبريد (مشتركة لكل العمليات) -->
<div class="modal-bd" id="otpModal">
  <div class="modal-box">
    <div class="modal-t">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span id="otpTitle">تأكيد العملية</span>
    </div>
    <p id="otpDesc" style="color:var(--muted);font-size:0.85rem;line-height:1.7;margin-bottom:16px;"></p>
    <div class="err" id="otpErr"></div>
    <input type="text" id="otpCode" class="otp-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
    <div class="otp-actions">
      <button class="link-btn" id="otpResendBtn" onclick="resendOtp()">إعادة إرسال الكود</button>
      <span id="otpCooldown"></span>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeOtpModal()">إلغاء</button>
      <button class="btn-submit" style="width:auto;padding:10px 26px;" id="otpConfirmBtn" onclick="confirmOtp()">تأكيد</button>
    </div>
  </div>
</div>

<!-- نافذة تأكيد حذف الحساب -->
<div class="modal-bd" id="deleteModal">
  <div class="modal-box">
    <div class="modal-t danger-t">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      <span>حذف الحساب نهائياً</span>
    </div>
    <p style="color:var(--muted);font-size:0.85rem;line-height:1.7;margin-bottom:16px;">
      هذا الإجراء لا يمكن التراجع عنه. سيتم حذف حسابك، منشوراتك، رسائلك، وكل بياناتك على هوستاكا نهائياً بعد تأكيد كلمة المرور وكود يُرسل إلى بريدك الإلكتروني.
    </p>
    <div class="err" id="deleteErr"></div>
    <div class="fg">
      <label class="f-label">كلمة المرور الحالية</label>
      <input type="password" id="deletePassword" class="f-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('deleteModal')">إلغاء</button>
      <button class="btn-danger" id="deleteConfirmBtn" onclick="requestDeleteAccount()">متابعة الحذف</button>
    </div>
  </div>
</div>

<div id="toastHost"></div>

<script src="/script.js" defer></script>
</body>
</html>
