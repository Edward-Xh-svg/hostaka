<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hostaka Admin</title>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--border:#e5e5e5;--text:#1a1a1a;--muted:#6b7280;--card:#ffffff;--bg:#f7f7f8;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;display:flex;}
    .sidebar{width:220px;background:#fff;border-left:1px solid var(--border);padding:24px 12px;display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;}
    .logo{font-weight:900;font-size:1.2rem;color:#111;padding:0 8px;margin-bottom:28px;}
    .nav-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;cursor:pointer;color:var(--muted);font-size:0.88rem;border:none;background:none;width:100%;text-align:right;font-family:'Cairo';margin-bottom:2px;transition:0.18s;}
    .nav-item:hover{background:rgba(0,0,0,0.04);color:#111;}
    .nav-item.active{background:rgba(0,0,0,0.07);color:#111;font-weight:700;}
    .sidebar-footer{margin-top:auto;padding:12px;}
    .user-info{font-size:0.82rem;color:var(--muted);margin-bottom:8px;}
    .user-info span{color:#111;font-weight:700;}
    .btn-logout{width:100%;padding:9px;background:#111;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'Cairo';font-size:0.85rem;transition:0.2s;}
    .btn-logout:hover{background:#333;}
    .main{margin-right:220px;flex:1;padding:28px;}
    .page{display:none;}
    .page.active{display:block;}
    .page-title{font-size:1.2rem;font-weight:800;color:#111;margin-bottom:20px;}
    .card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:24px;}
    .stat-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center;}
    .stat-n{font-size:1.8rem;font-weight:900;color:#111;}
    .stat-l{font-size:0.78rem;color:var(--muted);margin-top:3px;}
    table{width:100%;border-collapse:collapse;font-size:0.85rem;}
    th{padding:10px 12px;text-align:right;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);}
    td{padding:11px 12px;border-bottom:1px solid rgba(0,0,0,0.04);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(0,0,0,0.02);}
    .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:0.72rem;font-weight:700;}
    .badge-admin{background:rgba(0,0,0,0.08);color:#111;border:1px solid rgba(0,0,0,0.15);}
    .badge-user{background:rgba(0,0,0,0.04);color:var(--muted);border:1px solid var(--border);}
    .badge-pending{background:rgba(234,179,8,0.1);color:#854d0e;border:1px solid rgba(234,179,8,0.3);}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;cursor:pointer;font-family:'Cairo';font-size:0.82rem;font-weight:700;border:none;transition:0.18s;}
    .btn-dark{background:#111;color:#fff;}
    .btn-dark:hover{background:#333;}
    .btn-ghost{background:rgba(0,0,0,0.05);color:#444;border:1px solid var(--border);}
    .btn-ghost:hover{background:rgba(0,0,0,0.09);}
    .btn-sm{padding:5px 10px;font-size:0.78rem;}
    .alert{padding:10px 14px;border-radius:8px;font-size:0.85rem;margin-bottom:12px;display:none;}
    .alert-err{background:rgba(239,68,68,0.08);color:#dc2626;border:1px solid rgba(239,68,68,0.2);}
    .form-input{width:100%;padding:10px 12px;background:#f9f9f9;border:1px solid var(--border);border-radius:9px;color:#111;font-family:'Cairo';font-size:0.88rem;margin-bottom:12px;}
    .form-input:focus{outline:none;border-color:#999;}
    .form-label{display:block;color:var(--muted);font-size:0.82rem;font-weight:600;margin-bottom:5px;}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:11px 22px;border-radius:10px;font-size:0.86rem;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
    .toast.show{opacity:1;}

    /* Login */
    #loginScreen{position:fixed;inset:0;background:#f7f7f8;display:flex;align-items:center;justify-content:center;z-index:999;}
    .login-box{background:#fff;border:1px solid var(--border);border-radius:18px;padding:36px;width:100%;max-width:380px;}
    .login-title{font-size:1.4rem;font-weight:900;color:#111;margin-bottom:4px;}
    .login-sub{font-size:0.88rem;color:var(--muted);margin-bottom:24px;}
    .btn-login-submit{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:'Cairo';font-weight:800;font-size:0.92rem;transition:0.2s;margin-top:4px;}
    .btn-login-submit:hover{background:#333;}
    .btn-login-submit:disabled{opacity:0.5;cursor:not-allowed;}
  </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">Hostaka Admin</div>
    <div class="login-sub">لوحة الإدارة</div>
    <div class="alert alert-err" id="loginErr"></div>
    <label class="form-label">البريد الإلكتروني</label>
    <input class="form-input" type="email" id="loginEmail" dir="ltr">
    <label class="form-label">كلمة المرور</label>
    <input class="form-input" type="password" id="loginPass">
    <button class="btn-login-submit" id="loginBtn" onclick="doLogin()">دخول</button>
  </div>
</div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar" style="display:none;">
  <div class="logo">Hostaka</div>
  <nav>
    <button class="nav-item active" onclick="showPage('dashboard')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      الرئيسية
    </button>
    <button class="nav-item" onclick="showPage('users')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      المستخدمون
    </button>
    <button class="nav-item" onclick="showPage('posts')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      المنشورات
    </button>
    <button class="nav-item" onclick="showPage('verify')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      التوثيق
      <span id="verifyBadge" style="background:#111;color:#fff;font-size:0.65rem;padding:1px 6px;border-radius:999px;margin-right:auto;display:none;"></span>
    </button>
    <button class="nav-item" onclick="showPage('notify')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      إرسال إشعار
    </button>
    <button class="nav-item" onclick="window.open('/', '_blank')">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      عرض المنصة
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">مسجل كـ <span id="adminName"></span></div>
    <button class="btn-logout" onclick="doLogout()">تسجيل الخروج</button>
  </div>
</aside>

<main class="main" id="mainContent" style="display:none;">

  <!-- Dashboard -->
  <div class="page active" id="page-dashboard">
    <div class="page-title">مرحباً بك في Hostaka Admin</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-n" id="sUsers">-</div><div class="stat-l">مستخدم</div></div>
      <div class="stat-card"><div class="stat-n" id="sPosts">-</div><div class="stat-l">منشور</div></div>
      <div class="stat-card"><div class="stat-n" id="sVerify">-</div><div class="stat-l">طلب توثيق</div></div>
    </div>
  </div>

  <!-- Users -->
  <div class="page" id="page-users">
    <div class="page-title">المستخدمون</div>
    <div class="card">
      <table><thead><tr><th>المستخدم</th><th>البريد</th><th>الصلاحية</th><th>التوثيق</th><th>إجراءات</th></tr></thead>
      <tbody id="usersTable"><tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px;">جارٍ التحميل...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Posts -->
  <div class="page" id="page-posts">
    <div class="page-title">المنشورات</div>
    <div class="card" id="postsList"><div style="text-align:center;color:var(--muted);padding:24px;">جارٍ التحميل...</div></div>
  </div>

  <!-- Verify -->
  <div class="page" id="page-verify">
    <div class="page-title">طلبات التوثيق</div>
    <div class="card" id="verifyList"><div style="text-align:center;color:var(--muted);padding:24px;">جارٍ التحميل...</div></div>
  </div>

  <!-- Notify -->
  <div class="page" id="page-notify">
    <div class="page-title">إرسال إشعار للأعضاء</div>
    <div class="card">
      <label class="form-label">الوجهة</label>
      <select class="form-input" id="ntTarget">
        <option value="all">جميع الأعضاء</option>
        <option value="user">مستخدم محدد</option>
      </select>
      <div id="ntUserWrap" style="display:none;">
        <label class="form-label">اسم المستخدم (بدون @)</label>
        <input class="form-input" type="text" id="ntUsername" placeholder="username" dir="ltr">
      </div>
      <label class="form-label">نص الإشعار *</label>
      <input class="form-input" type="text" id="ntContent" placeholder="مثال: تحديث جديد على المنصة!">
      <label class="form-label">رابط عند الضغط (اختياري)</label>
      <input class="form-input" type="text" id="ntLink" placeholder="/ أو /profile?u=..." dir="ltr">
      <button class="btn btn-dark" id="ntSendBtn" onclick="sendAdminNotif()">إرسال الإشعار</button>
    </div>
  </div>

</main>
<div class="toast" id="toast"></div>

<script>
let TOKEN = localStorage.getItem('hostaka_token')||'';

async function api(url,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(url,opts); return r.json();
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(s){if(!s)return'';return new Date(s).toLocaleDateString('ar-SA',{year:'numeric',month:'short',day:'numeric'});}

// Login
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const errEl=document.getElementById('loginErr'); errEl.style.display='none';
  const btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='...';
  try{
    const d=await api('/api/login','POST',{email,password:pass});
    if(d.role!=='admin'){errEl.textContent='ليس لديك صلاحية admin';errEl.style.display='block';btn.disabled=false;btn.textContent='دخول';return;}
    TOKEN=d.token; localStorage.setItem('hostaka_token',TOKEN);
    initAdmin(d.username);
  }catch(e){errEl.textContent='فشل الاتصال';errEl.style.display='block';btn.disabled=false;btn.textContent='دخول';}
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogout(){TOKEN='';localStorage.removeItem('hostaka_token');location.reload();}

function initAdmin(username){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('sidebar').style.display='flex';
  document.getElementById('mainContent').style.display='block';
  document.getElementById('adminName').textContent=username;
  loadDashboard();
}

(async function checkSession(){
  if(!TOKEN) return;
  try{
    const r=await fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+TOKEN}});
    const u=await r.json();
    if(!u||u.error||u.role!=='admin'){TOKEN='';localStorage.removeItem('hostaka_token');return;}
    initAdmin(u.username);
  }catch(e){TOKEN='';localStorage.removeItem('hostaka_token');}
})();

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  event?.currentTarget?.classList.add('active');
  if(name==='users') loadUsers();
  if(name==='posts') loadPosts();
  if(name==='verify') loadVerify();
  if(name==='dashboard') loadDashboard();
}

document.getElementById('ntTarget')?.addEventListener('change', function(){
  document.getElementById('ntUserWrap').style.display = this.value==='user' ? 'block' : 'none';
});

async function sendAdminNotif(){
  const target = document.getElementById('ntTarget').value === 'user'
    ? document.getElementById('ntUsername').value.trim()
    : 'all';
  const content = document.getElementById('ntContent').value.trim();
  const link = document.getElementById('ntLink').value.trim();
  if(!content){ toast('اكتب نص الإشعار'); return; }
  if(target !== 'all' && !target){ toast('حدد اسم المستخدم'); return; }
  const btn = document.getElementById('ntSendBtn');
  btn.disabled = true; btn.textContent = 'جارٍ الإرسال...';
  try{
    const d = await api('/api/admin/notifications', 'POST', { content, link, target });
    if(d.success){
      toast('تم إرسال الإشعار إلى ' + d.count + ' عضو');
      document.getElementById('ntContent').value = '';
      document.getElementById('ntLink').value = '';
      document.getElementById('ntUsername').value = '';
    } else {
      toast(d.error || 'فشل الإرسال');
    }
  }catch(e){ toast('تعذر الاتصال'); }
  btn.disabled = false; btn.textContent = 'إرسال الإشعار';
}

async function loadDashboard(){
  try{
    const[users,posts,verify]=await Promise.all([api('/api/admin/users'),api('/api/records'),api('/api/admin/verify')]);
    document.getElementById('sUsers').textContent=users.length||0;
    document.getElementById('sPosts').textContent=posts.length||0;
    document.getElementById('sVerify').textContent=verify.length||0;
    const vb=document.getElementById('verifyBadge');
    if(verify.length){vb.textContent=verify.length;vb.style.display='inline';}
  }catch(e){}
}

async function loadUsers(){
  try{
    const users=await api('/api/admin/users');
    document.getElementById('usersTable').innerHTML=users.map(u=>`
      <tr>
        <td><strong>${esc(u.display_name||u.username)}</strong><div style="font-size:0.75rem;color:var(--muted);">@${esc(u.username)}</div></td>
        <td style="font-size:0.82rem;color:var(--muted);" dir="ltr">${esc(u.email)}</td>
        <td><span class="badge badge-${u.role==='admin'?'admin':'user'}">${u.role==='admin'?'Admin':'User'}</span></td>
        <td>${u.verified?'<svg width="14" height="14" viewBox="0 0 24 24" fill="#3b9eff"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>':'–'}</td>
        <td>
          <div style="display:flex;gap:6px;">
            ${u.role!=='admin'?`<button class="btn btn-dark btn-sm" onclick="promoteUser(${u.id})">ترقية</button>`:''}
            ${u.role!=='admin'?`<button class="btn btn-ghost btn-sm" onclick="deleteUser(${u.id},'${esc(u.username)}')">حذف</button>`:''}
          </div>
        </td>
      </tr>`).join('');
  }catch(e){toast('فشل تحميل المستخدمين');}
}

async function promoteUser(id){
  if(!confirm('ترقية هذا المستخدم لـ admin؟')) return;
  await api('/api/admin/users/'+id+'/role','PUT',{role:'admin'});
  toast('تمت الترقية'); loadUsers();
}
async function deleteUser(id,name){
  if(!confirm('حذف '+name+'؟')) return;
  await api('/api/admin/users/'+id,'DELETE');
  toast('تم الحذف'); loadUsers();
}

async function loadPosts(){
  try{
    const posts=await api('/api/records');
    const el=document.getElementById('postsList');
    if(!posts.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:24px;">لا توجد منشورات</div>';return;}
    el.innerHTML=posts.map(p=>`
      <div style="border-bottom:1px solid var(--border);padding:14px 0;display:flex;gap:12px;align-items:flex-start;">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <strong style="font-size:0.88rem;">${esc(p.publisher)}</strong>
            <span class="badge badge-${p.user_role==='Admin'?'admin':'user'}">${esc(p.user_role)}</span>
            <span style="font-size:0.75rem;color:var(--muted);">${fmtDate(p.created_at)}</span>
          </div>
          <div style="font-size:0.85rem;color:#444;line-height:1.6;">${(p.content||'').replace(/<[^>]+>/g,'').slice(0,120)}${(p.content||'').length>120?'...':''}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="deletePost(${p.id})">حذف</button>
      </div>`).join('');
  }catch(e){toast('فشل تحميل المنشورات');}
}

async function deletePost(id){
  if(!confirm('حذف هذا المنشور؟')) return;
  await api('/api/records/'+id,'DELETE');
  toast('تم الحذف'); loadPosts();
}

async function loadVerify(){
  try{
    const reqs=await api('/api/admin/verify');
    const el=document.getElementById('verifyList');
    if(!reqs.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:24px;">لا توجد طلبات معلقة</div>';return;}
    el.innerHTML=reqs.map(r=>`
      <div style="display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
        <div style="width:38px;height:38px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0;overflow:hidden;">
          ${r.avatar?`<img src="${esc(r.avatar)}" style="width:100%;height:100%;object-fit:cover;">`:(r.display_name||r.username||'?').charAt(0).toUpperCase()}
        </div>
        <div style="flex:1;">
          <strong>${esc(r.display_name||r.username)}</strong>
          <div style="font-size:0.75rem;color:var(--muted);">@${esc(r.username)} · ${fmtDate(r.created_at)}</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-dark btn-sm" onclick="approveVerify(${r.user_id})">موافقة</button>
          <button class="btn btn-ghost btn-sm" onclick="rejectVerify(${r.user_id})">رفض</button>
        </div>
      </div>`).join('');
    const vb=document.getElementById('verifyBadge');
    if(reqs.length){vb.textContent=reqs.length;vb.style.display='inline';}
  }catch(e){toast('فشل تحميل الطلبات');}
}

async function approveVerify(id){
  await api('/api/admin/verify/'+id,'PUT',{action:'approve'});
  toast('تم منح التوثيق'); loadVerify(); loadDashboard();
}
async function rejectVerify(id){
  if(!confirm('رفض الطلب؟')) return;
  await api('/api/admin/verify/'+id,'PUT',{action:'reject'});
  toast('تم الرفض'); loadVerify();
}
</script>
</body>
</html>
